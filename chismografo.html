<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chismógrafo · La Chabalada</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Permanent+Marker&family=Bebas+Neue&family=Patrick+Hand&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --paper:      #faf6ea;
  --paper2:     #f5f0df;
  --paper3:     #ede8d5;
  --lines:      #c8bfa8;
  --margin:     #e8a0a0;
  --ink:        #1a1208;
  --ink-mid:    #3a2a14;
  --ink-faded:  #7a6448;
  --blue-ink:   #1a3a6b;
  --red-ink:    #8b1a1a;
  --red:        #c0281e;
  --red-bright: #e8352a;
  --black:      #090909;
  --gray:       #141414;
  --spiral:     #7a7a7a;
}
html, body { min-height: 100vh; }
body {
  background: #1a1208;
  background-image:
    radial-gradient(ellipse at 25% 50%, rgba(60,35,10,.4) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 20%, rgba(40,22,4,.3) 0%, transparent 50%);
  font-family: 'Patrick Hand', cursive;
  overflow-x: hidden;
}

/* NAV */
nav {
  display: flex; align-items: center; justify-content: space-between;
  padding: .85rem 2rem;
  background: rgba(9,9,9,.9); backdrop-filter: blur(6px);
  border-bottom: 1px solid rgba(192,40,30,.15);
}
.nav-logo {
  font-family: 'Permanent Marker', cursive;
  font-size: 20px; color: var(--red);
  text-decoration: none;
  text-shadow: 0 0 10px rgba(192,40,30,.35);
}
.nav-back {
  font-family: 'Bebas Neue', sans-serif; font-size: 12px; letter-spacing: 4px;
  color: rgba(240,236,228,.38); text-decoration: none; transition: color .2s;
}
.nav-back:hover { color: var(--red-bright); }

/* MAIN */
.main {
  display: flex; flex-direction: column; align-items: center;
  padding: 2.5rem 1rem 6rem;
}

/* BOOK */
.book-wrap { width: 100%; max-width: 700px; position: relative; }

.spirals {
  position: absolute; left: 24px; top: -6px; bottom: -6px;
  display: flex; flex-direction: column;
  justify-content: space-evenly; z-index: 30; pointer-events: none;
}
.spiral-ring {
  width: 20px; height: 20px; border-radius: 50%;
  border: 3px solid var(--spiral);
  background: #1a1208; box-shadow: inset 0 0 0 2px #2a2a2a;
}

/* PAGE */
.page {
  background: var(--paper);
  border-radius: 2px 6px 6px 2px;
  min-height: 580px; position: relative; overflow: hidden;
  margin-left: 36px;
  box-shadow:
    -3px 0 0 #cfc8b0,
    4px 4px 0 rgba(0,0,0,.32),
    8px 8px 0 rgba(0,0,0,.16),
    12px 12px 0 rgba(0,0,0,.07);
}

/* ruled lines */
.page::before {
  content: ''; position: absolute; inset: 0; pointer-events: none;
  background-image: repeating-linear-gradient(
    to bottom, transparent 0px, transparent 33px,
    var(--lines) 33px, var(--lines) 34px
  );
  background-position: 0 58px;
}

/* red margin */
.page::after {
  content: ''; position: absolute; top: 0; bottom: 0;
  left: 72px; width: 1.5px; background: var(--margin);
  pointer-events: none; z-index: 1;
}

/* PAGE HEADER */
.page-header {
  padding: .75rem 1.5rem .5rem 5.5rem;
  border-bottom: 2px solid rgba(200,191,168,.6);
  position: relative; z-index: 2;
}
.page-title {
  font-family: 'Permanent Marker', cursive;
  font-size: 30px; color: var(--red);
  text-shadow: 1px 1px 0 rgba(192,40,30,.15);
  line-height: 1.1;
}
.page-subtitle {
  font-size: 15px; color: var(--ink-faded); margin-top: 1px; padding-bottom: .3rem;
}

/* PAGE BODY */
.page-body {
  padding: 1.25rem 1.75rem 2rem 5.5rem;
  position: relative; z-index: 2;
}

/* ── COVER ── */
.cover-center {
  text-align: center; padding: 1.5rem 1rem;
}
.cover-big-num {
  font-family: 'Permanent Marker', cursive;
  font-size: 90px; line-height: 1;
  color: var(--paper3);
  text-shadow: 2px 2px 0 rgba(0,0,0,.07);
}
.cover-label {
  font-family: 'Caveat', cursive; font-size: 22px; color: var(--ink-mid);
}
.cover-eyebrow {
  font-family: 'Bebas Neue', sans-serif; font-size: 10px; letter-spacing: 5px;
  color: var(--red); opacity: .55; display: block; margin-bottom: .25rem;
}
.cover-doodle {
  font-size: 13px; color: var(--ink-faded); opacity: .45;
  border-top: 1px dashed var(--lines); border-bottom: 1px dashed var(--lines);
  padding: .25rem 0; margin: .75rem auto; max-width: 280px;
}

/* COVER BUTTONS */
.cover-btns {
  display: flex; flex-direction: column; gap: .75rem; margin-top: 1.5rem;
}
.btn-primary {
  display: block; width: 100%;
  font-family: 'Bebas Neue', sans-serif; font-size: 15px; letter-spacing: 5px;
  color: #fff; background: var(--red-bright); border: none;
  padding: 13px; cursor: pointer;
  clip-path: polygon(4px 0%,100% 0%,calc(100% - 4px) 100%,0% 100%);
  transition: background .15s, transform .1s;
}
.btn-primary:hover { background: #ff3d31; transform: scale(1.01); }
.btn-secondary {
  display: block; width: 100%;
  font-family: 'Bebas Neue', sans-serif; font-size: 15px; letter-spacing: 5px;
  color: var(--ink); background: none;
  border: 1.5px solid rgba(42,31,14,.25);
  padding: 12px; cursor: pointer; border-radius: 2px;
  transition: all .15s;
}
.btn-secondary:hover { border-color: var(--ink); background: rgba(42,31,14,.05); }

/* ── QUESTION PAGE ── */
.q-page-header {
  font-family: 'Bebas Neue', sans-serif; font-size: 10px; letter-spacing: 5px;
  color: var(--red); opacity: .55; margin-bottom: .5rem;
}
.q-page-question {
  font-family: 'Permanent Marker', cursive;
  font-size: 20px; color: var(--ink-mid);
  line-height: 1.3; margin-bottom: 1.25rem;
  padding-bottom: .75rem;
  border-bottom: 1px dashed rgba(200,191,168,.7);
}

/* ANSWER ROWS */
.answers-list { display: flex; flex-direction: column; }

.answer-row {
  display: flex; align-items: baseline; gap: .75rem;
  padding: .2rem 0;
  border-bottom: 1px solid rgba(200,191,168,.35);
  min-height: 34px;
}
.answer-num {
  font-family: 'Bebas Neue', sans-serif; font-size: 12px;
  color: var(--red); opacity: .55; min-width: 22px; flex-shrink: 0;
  letter-spacing: 1px;
}
.answer-name {
  font-size: 14px; color: var(--ink-faded); min-width: 100px;
  flex-shrink: 0; font-style: italic;
}
.answer-text {
  font-size: 18px; color: var(--blue-ink); flex: 1;
  line-height: 1.3; font-family: 'Patrick Hand', cursive;
}
.answer-empty {
  font-size: 14px; color: var(--lines); font-style: italic;
}

.no-entries {
  font-size: 17px; color: var(--ink-faded); text-align: center;
  padding: 2rem 1rem; opacity: .6;
  font-family: 'Caveat', cursive;
}

/* PAGE NAV */
.page-nav {
  display: flex; align-items: center; justify-content: space-between;
  margin-top: 1.5rem; padding-top: .75rem;
  border-top: 1px dashed rgba(200,191,168,.6);
}
.nav-btn {
  font-family: 'Bebas Neue', sans-serif; font-size: 12px; letter-spacing: 3px;
  background: none; border: 1px solid rgba(42,31,14,.18);
  color: var(--ink-faded); padding: 6px 16px; cursor: pointer;
  border-radius: 2px; transition: all .15s;
}
.nav-btn:hover { border-color: var(--red); color: var(--red); }
.nav-btn:disabled { opacity: .2; cursor: default; }
.page-counter {
  font-family: 'Caveat', cursive; font-size: 16px; color: var(--ink-faded);
}

/* ── NEW ENTRY FORM ── */
.form-step-indicator {
  font-family: 'Bebas Neue', sans-serif; font-size: 10px; letter-spacing: 5px;
  color: var(--red); opacity: .55; margin-bottom: 1.25rem;
}
.form-question {
  font-family: 'Permanent Marker', cursive;
  font-size: 20px; color: var(--ink-mid);
  line-height: 1.3; margin-bottom: 1rem;
}
.handwritten-input {
  width: 100%; background: transparent; border: none;
  border-bottom: 1.5px solid var(--lines);
  font-family: 'Patrick Hand', cursive; font-size: 20px;
  color: var(--blue-ink); padding: 6px 0 3px;
  outline: none; transition: border-color .2s; margin-bottom: 1.25rem;
}
.handwritten-input:focus { border-bottom-color: var(--blue-ink); }
.handwritten-input::placeholder { color: var(--lines); }
.handwritten-textarea {
  width: 100%; background: transparent; border: none;
  border-bottom: 1.5px solid var(--lines);
  font-family: 'Patrick Hand', cursive; font-size: 19px;
  color: var(--blue-ink); padding: 6px 0 3px;
  outline: none; resize: none; line-height: 1.9;
  transition: border-color .2s; margin-bottom: 1.25rem;
}
.handwritten-textarea:focus { border-bottom-color: var(--blue-ink); }
.handwritten-textarea::placeholder { color: var(--lines); }
.form-btns { display: flex; gap: .75rem; margin-top: .5rem; }
.btn-form-next {
  flex: 1; font-family: 'Bebas Neue', sans-serif; font-size: 13px; letter-spacing: 4px;
  background: var(--ink); color: var(--paper); border: none;
  padding: 11px; cursor: pointer; border-radius: 2px; transition: opacity .15s;
}
.btn-form-next:hover { opacity: .78; }
.btn-form-back {
  font-family: 'Bebas Neue', sans-serif; font-size: 12px; letter-spacing: 3px;
  background: none; border: 1px solid rgba(42,31,14,.2);
  color: var(--ink-faded); padding: 11px 16px; cursor: pointer; border-radius: 2px;
}
.btn-form-back:hover { border-color: var(--ink); color: var(--ink); }
.btn-submit {
  width: 100%; font-family: 'Bebas Neue', sans-serif; font-size: 15px; letter-spacing: 5px;
  background: var(--red-bright); color: #fff; border: none;
  padding: 13px; cursor: pointer;
  clip-path: polygon(3px 0%,100% 0%,calc(100% - 3px) 100%,0% 100%);
  transition: background .15s;
}
.btn-submit:hover { background: #ff3d31; }

/* STATE */
.state-center { text-align: center; padding: 2.5rem 1rem; }
.spinner {
  width: 32px; height: 32px; border: 2px solid rgba(42,31,14,.1);
  border-top-color: var(--red); border-radius: 50%;
  animation: spin .8s linear infinite; margin: 0 auto 1rem;
}
@keyframes spin { to { transform: rotate(360deg); } }
.state-msg { font-family: 'Caveat', cursive; font-size: 20px; color: var(--ink-faded); }
.success-big {
  font-family: 'Permanent Marker', cursive;
  font-size: 28px; color: var(--red); display: block; margin-bottom: .5rem;
}

/* TABS */
.book-tabs {
  display: flex; gap: .5rem; margin-top: 1.5rem;
  justify-content: center; flex-wrap: wrap;
}
.book-tab {
  font-family: 'Bebas Neue', sans-serif; font-size: 11px; letter-spacing: 3px;
  background: rgba(245,240,224,.06); border: 1px solid rgba(245,240,224,.12);
  color: rgba(245,240,224,.38); padding: 6px 18px; cursor: pointer;
  border-radius: 2px; transition: all .15s;
}
.book-tab:hover,.book-tab.active {
  background: rgba(192,40,30,.14); border-color: var(--red); color: var(--red-bright);
}

/* doodles */
.doodle {
  position: absolute; font-family: 'Caveat', cursive;
  color: var(--ink-faded); pointer-events: none; opacity: .14;
}

@media(max-width:520px){
  .page-body { padding: 1rem 1rem 1.5rem 1rem; }
  .page::after { display: none; }
  .spirals { left: 8px; }
  .page { margin-left: 26px; }
  .answer-name { min-width: 70px; font-size: 13px; }
  .answer-text { font-size: 16px; }
}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">La Chabalada</a>
  <a href="index.html" class="nav-back">&#8592;&nbsp; Volver</a>
</nav>

<div class="main">
  <div class="book-wrap">
    <div class="spirals" id="spirals"></div>

    <div class="page" id="page">
      <!-- SVG pen doodles — margin scribbles -->
      <svg xmlns="http://www.w3.org/2000/svg"
           style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:3;overflow:visible;">
        <defs>
          <filter id="wobble">
            <feTurbulence type="fractalNoise" baseFrequency="0.035" numOctaves="4" seed="12" result="noise"/>
            <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.2" xChannelSelector="R" yChannelSelector="G"/>
          </filter>
          <filter id="wobble2">
            <feTurbulence type="fractalNoise" baseFrequency="0.045" numOctaves="3" seed="5" result="noise"/>
            <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.9" xChannelSelector="R" yChannelSelector="G"/>
          </filter>
        </defs>

        <!-- ═══ LEFT MARGIN (between spiral and red line ~38-68px) ═══ -->

        <!-- flower with stem -->
        <g transform="translate(52,80) rotate(-6)" filter="url(#wobble)" opacity="0.38">
          <circle cx="0" cy="0" r="4" fill="none" stroke="#1a3a6b" stroke-width="1.4"/>
          <ellipse cx="0" cy="-9" rx="3.5" ry="5.5" fill="none" stroke="#1a3a6b" stroke-width="1.2"/>
          <ellipse cx="0" cy="-9" rx="3.5" ry="5.5" fill="none" stroke="#1a3a6b" stroke-width="1.2" transform="rotate(60)"/>
          <ellipse cx="0" cy="-9" rx="3.5" ry="5.5" fill="none" stroke="#1a3a6b" stroke-width="1.2" transform="rotate(120)"/>
          <ellipse cx="0" cy="-9" rx="3.5" ry="5.5" fill="none" stroke="#1a3a6b" stroke-width="1.2" transform="rotate(180)"/>
          <ellipse cx="0" cy="-9" rx="3.5" ry="5.5" fill="none" stroke="#1a3a6b" stroke-width="1.2" transform="rotate(240)"/>
          <ellipse cx="0" cy="-9" rx="3.5" ry="5.5" fill="none" stroke="#1a3a6b" stroke-width="1.2" transform="rotate(300)"/>
          <line x1="0" y1="5" x2="0" y2="20" stroke="#1a3a6b" stroke-width="1.3" stroke-linecap="round"/>
          <path d="M0,13 Q7,10 9,6" fill="none" stroke="#1a3a6b" stroke-width="1.1" stroke-linecap="round"/>
        </g>

        <!-- arrow -->
        <g transform="translate(42,175)" filter="url(#wobble)" opacity="0.35">
          <path d="M0,0 Q10,-2 20,0" fill="none" stroke="#8b1a1a" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M15,-5 L21,0 L15,5" fill="none" stroke="#8b1a1a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </g>

        <!-- 6-pointed star -->
        <g transform="translate(52,255) rotate(8)" filter="url(#wobble)" opacity="0.32">
          <path d="M0,-14 L3,-5 L12,-5 L5,1 L8,10 L0,5 L-8,10 L-5,1 L-12,-5 L-3,-5 Z"
                fill="none" stroke="#1a3a6b" stroke-width="1.4" stroke-linejoin="round"/>
          <circle cx="0" cy="0" r="3" fill="none" stroke="#1a3a6b" stroke-width="1.1"/>
        </g>

        <!-- wavy line -->
        <g transform="translate(36,330)" filter="url(#wobble2)" opacity="0.3">
          <path d="M0,0 Q5,-5 10,0 Q15,5 20,0 Q25,-5 30,0 Q35,5 40,0"
                fill="none" stroke="#1a3a6b" stroke-width="1.3" stroke-linecap="round"/>
        </g>

        <!-- big heart -->
        <g transform="translate(52,400) rotate(-4)" filter="url(#wobble)" opacity="0.38">
          <path d="M0,8 C-3,4 -12,1 -12,-6 C-12,-12 -6,-15 0,-10 C6,-15 12,-12 12,-6 C12,1 3,4 0,8Z"
                fill="none" stroke="#8b1a1a" stroke-width="1.5" stroke-linejoin="round"/>
        </g>

        <!-- "TM + NV" inside heart scribble -->
        <g transform="translate(52,400)" filter="url(#wobble2)" opacity="0.28">
          <text font-family="Caveat,cursive" font-size="7" fill="#8b1a1a" text-anchor="middle" dy="-1">TM+NV</text>
        </g>

        <!-- tiny peace sign -->
        <g transform="translate(52,468) rotate(5)" filter="url(#wobble)" opacity="0.33">
          <circle cx="0" cy="0" r="11" fill="none" stroke="#1a3a6b" stroke-width="1.4"/>
          <line x1="0" y1="-11" x2="0" y2="11"   stroke="#1a3a6b" stroke-width="1.4"/>
          <line x1="0" y1="0"   x2="-9.5" y2="5.5" stroke="#1a3a6b" stroke-width="1.4"/>
          <line x1="0" y1="0"   x2="9.5"  y2="5.5" stroke="#1a3a6b" stroke-width="1.4"/>
        </g>

        <!-- vertical text in margin -->
        <g transform="translate(38,530) rotate(-90)" filter="url(#wobble2)" opacity="0.28">
          <text font-family="Caveat,cursive" font-size="12" fill="#1a3a6b" text-anchor="middle" font-style="italic">la chabalada ♥</text>
        </g>

        <!-- small spiral -->
        <g transform="translate(50,570)" filter="url(#wobble)" opacity="0.3">
          <path d="M0,0 Q0,-8 8,-8 Q16,-8 16,0 Q16,10 6,10 Q-4,10 -4,2 Q-4,-4 2,-4 Q6,-4 6,0 Q6,4 3,4"
                fill="none" stroke="#8b6914" stroke-width="1.3" stroke-linecap="round"/>
        </g>

        <!-- ink blots left -->
        <circle cx="44" cy="145" r="1.8" fill="#1a3a6b" opacity="0.2"/>
        <circle cx="40" cy="225" r="1.2" fill="#1a3a6b" opacity="0.16"/>
        <circle cx="46" cy="360" r="1.5" fill="#8b1a1a" opacity="0.18"/>
        <circle cx="42" cy="500" r="1.3" fill="#1a3a6b" opacity="0.15"/>

        <!-- ═══ RIGHT MARGIN (~650-680px) ═══ -->

        <!-- sun with face -->
        <g transform="translate(655,75) rotate(12)" filter="url(#wobble)" opacity="0.36">
          <circle cx="0" cy="0" r="9" fill="none" stroke="#8b6914" stroke-width="1.4"/>
          <line x1="0"   y1="-14" x2="0"   y2="-11" stroke="#8b6914" stroke-width="1.3" stroke-linecap="round"/>
          <line x1="0"   y1="11"  x2="0"   y2="14"  stroke="#8b6914" stroke-width="1.3" stroke-linecap="round"/>
          <line x1="-14" y1="0"   x2="-11" y2="0"   stroke="#8b6914" stroke-width="1.3" stroke-linecap="round"/>
          <line x1="11"  y1="0"   x2="14"  y2="0"   stroke="#8b6914" stroke-width="1.3" stroke-linecap="round"/>
          <line x1="-10" y1="-10" x2="-7.5" y2="-7.5" stroke="#8b6914" stroke-width="1.2" stroke-linecap="round"/>
          <line x1="7.5" y1="-7.5" x2="10" y2="-10"  stroke="#8b6914" stroke-width="1.2" stroke-linecap="round"/>
          <line x1="-10" y1="10"  x2="-7.5" y2="7.5" stroke="#8b6914" stroke-width="1.2" stroke-linecap="round"/>
          <line x1="7.5" y1="7.5"  x2="10"  y2="10"  stroke="#8b6914" stroke-width="1.2" stroke-linecap="round"/>
          <circle cx="-3" cy="-2" r="1.2" fill="#8b6914" opacity="0.7"/>
          <circle cx="3"  cy="-2" r="1.2" fill="#8b6914" opacity="0.7"/>
          <path d="M-4,3 Q0,7 4,3" fill="none" stroke="#8b6914" stroke-width="1.2" stroke-linecap="round"/>
        </g>

        <!-- smiley with X eyes (no homework face) -->
        <g transform="translate(658,185) rotate(-7)" filter="url(#wobble)" opacity="0.34">
          <circle cx="0" cy="0" r="13" fill="none" stroke="#1a3a6b" stroke-width="1.4"/>
          <line x1="-5" y1="-5" x2="-2" y2="-2" stroke="#1a3a6b" stroke-width="1.4" stroke-linecap="round"/>
          <line x1="-5" y1="-2" x2="-2" y2="-5" stroke="#1a3a6b" stroke-width="1.4" stroke-linecap="round"/>
          <line x1="2"  y1="-5" x2="5"  y2="-2" stroke="#1a3a6b" stroke-width="1.4" stroke-linecap="round"/>
          <line x1="2"  y1="-2" x2="5"  y2="-5" stroke="#1a3a6b" stroke-width="1.4" stroke-linecap="round"/>
          <path d="M-6,5 Q0,11 6,5" fill="none" stroke="#1a3a6b" stroke-width="1.4" stroke-linecap="round"/>
        </g>

        <!-- lightning bolt -->
        <g transform="translate(660,278) rotate(-8)" filter="url(#wobble)" opacity="0.33">
          <path d="M5,-16 L-3,-2 L5,-2 L-5,16 L3,2 L-5,2 Z"
                fill="none" stroke="#8b6914" stroke-width="1.5" stroke-linejoin="round"/>
        </g>

        <!-- 3D cube -->
        <g transform="translate(648,360) rotate(6)" filter="url(#wobble)" opacity="0.32">
          <rect x="-9" y="-7" width="15" height="13" fill="none" stroke="#1a3a6b" stroke-width="1.3"/>
          <rect x="-4" y="-12" width="15" height="13" fill="none" stroke="#1a3a6b" stroke-width="1.3"/>
          <line x1="-9" y1="-7"  x2="-4" y2="-12" stroke="#1a3a6b" stroke-width="1.3"/>
          <line x1="6"  y1="-7"  x2="11" y2="-12" stroke="#1a3a6b" stroke-width="1.3"/>
          <line x1="6"  y1="6"   x2="11" y2="1"   stroke="#1a3a6b" stroke-width="1.3"/>
        </g>

        <!-- flying bird (simple V shapes) -->
        <g transform="translate(645,440)" filter="url(#wobble2)" opacity="0.3">
          <path d="M-18,0 Q-12,-6 -8,0" fill="none" stroke="#1a3a6b" stroke-width="1.3" stroke-linecap="round"/>
          <path d="M-4,2  Q0,-5  4,2"   fill="none" stroke="#1a3a6b" stroke-width="1.3" stroke-linecap="round"/>

          <text font-family="Caveat,cursive" font-size="12" fill="#8b1a1a"

      <!-- COVER -->
      <div id="view-cover">
        <div class="page-header">
          <div class="page-title">Chismógrafo</div>

        <div class="page-body">
          <div class="cover-center">
            <div class="cover-doodle">~ el cuaderno que todos querían leer ~</div>
            <div class="cover-big-num" id="cover-num">0</div>
            <div class="cover-label">entradas registradas</div>
            <span class="cover-eyebrow" id="cover-sub" style="margin-top:.5rem">cargando...</span>
          </div>
          <div class="cover-btns">
            <button class="btn-primary"   onclick="window.startNewEntry()">+ Agregar mi entrada</button>
            <button class="btn-secondary" onclick="window.showChismografo()">Leer el chismógrafo</button>

      <!-- QUESTION PAGE VIEW -->
      <div id="view-questions" style="display:none">
        <div class="page-header">
          <div class="page-title" id="qv-title">—</div>
          <div class="page-subtitle" id="qv-sub">—</div>
        </div>
        <div class="page-body">
          <div class="q-page-header" id="qv-eyebrow"></div>
          <div class="q-page-question" id="qv-question"></div>
          <div class="answers-list" id="qv-answers"></div>
          <div class="page-nav">
            <button class="nav-btn" id="btn-qprev" onclick="window.goQuestion(-1)">&#8592; anterior</button>
            <span class="page-counter" id="qv-counter"></span>
            <button class="nav-btn" id="btn-qnext" onclick="window.goQuestion(1)">siguiente &#8594;</button>
          </div>
          <div class="cover-btns" style="margin-top:1rem">
            <button class="btn-primary"   onclick="window.startNewEntry()">+ Agregar mi entrada</button>

      <button class="book-tab"         id="tab-nueva"        onclick="window.startNewEntry()">+ Nueva entrada</button>

<!-- Firebase ES modules -->
<script type="module">
import { initializeApp }                             from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref as dbRef, push, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey:            "AIzaSyCkdH0PK5OWd9UTsmHtrT327MWnf0jIAbc",
  authDomain:        "lachabalada-6c3c3.firebaseapp.com",
  databaseURL:       "https://lachabalada-6c3c3-default-rtdb.firebaseio.com",
  projectId:         "lachabalada-6c3c3",
  storageBucket:     "lachabalada-6c3c3.firebasestorage.app",
  messagingSenderId: "412828348018",
  appId:             "1:412828348018:web:2bf7de6ebdd6ba5e8e1ceb"
};
const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);
const ref = dbRef(db, 'chismografo');

/* ── PREGUNTAS ── */
const QUESTIONS = [
  { id:'nombre',   label:'¿Cómo te llamas?',                                      type:'text', placeholder:'Tu nombre completo'          },
  { id:'apodo',    label:'¿Cuál era tu apodo en La Chabalada?',                   type:'text', placeholder:'El que todos te decían...'   },
  { id:'cancion',  label:'¿Cuál era tu canción del 2006?',                        type:'text', placeholder:'La que te da pena admitir'   },
  { id:'crush',    label:'¿Quién era tu crush? (o cómo era)',                     type:'area', placeholder:'El secreto mejor guardado...' },
  { id:'recuerdo', label:'¿Cuál es el recuerdo que más tienes de la escuela?',   type:'area', placeholder:'Esa historia que no se olvida'},
  { id:'secreto',  label:'Confiesa algo que nadie sabía de ti en la escuela',    type:'area', placeholder:'Ahora puedes decirlo...'      },
  { id:'ahora',    label:'¿En qué terminaste trabajando?',                        type:'area', placeholder:'La vida adulta es rara...'   },
  { id:'consejo',  label:'¿Qué le dirías a tu yo de 17 años?',                   type:'area', placeholder:'Una sola cosa...'            },
  { id:'palabra',  label:'Una palabra para describir cómo estás hoy',             type:'text', placeholder:'Solo una'                   },
];

/* ── STATE ── */
let entries  = [];
let nextNum  = 1;
let qIdx     = 0;
let formStep = 0;
let formData = {};

/* ── SPIRALS ── */
const sp = document.getElementById('spirals');
for (let i = 0; i < 11; i++) {
  const r = document.createElement('div'); r.className = 'spiral-ring'; sp.appendChild(r);
}

/* ── FIREBASE LOAD ── */
onValue(ref, snap => {
  const data = snap.val() || {};
  entries = Object.values(data).sort((a,b) => a.num - b.num);
  nextNum = entries.length ? entries[entries.length-1].num + 1 : 1;
  updateCover();
  if (document.getElementById('view-questions').style.display !== 'none') renderQuestion(qIdx);
});

function updateCover() {
  const n = entries.length;
  document.getElementById('cover-num').textContent = n;
  document.getElementById('cover-sub').textContent =
    n === 0 ? '¡sé el primero!' : `chabal${n!==1?'as/es':'ada/e'} en el cuaderno`;
}

/* ── VIEWS ── */
function showView(name) {
  ['cover','questions','form'].forEach(v =>
    document.getElementById('view-'+v).style.display = v===name ? 'block' : 'none'
  );
}
function setTab(id) {
  document.querySelectorAll('.book-tab').forEach(t => t.classList.remove('active'));
  if (id) document.getElementById(id).classList.add('active');
}

window.showCover = function() {
  showView('cover'); setTab('tab-portada');
};

window.showChismografo = function() {
  if (!entries.length) { window.showCover(); return; }
  qIdx = 0;
  showView('questions');
  renderQuestion(0);
  setTab('tab-chismografo');
};

window.goQuestion = function(d) {
  qIdx = Math.max(0, Math.min(qIdx + d, QUESTIONS.length - 1));
  renderQuestion(qIdx);
  document.getElementById('page').scrollIntoView({ behavior:'smooth', block:'start' });
};

/* ── RENDER QUESTION PAGE ── */
function renderQuestion(idx) {
  const q = QUESTIONS[idx];
  document.getElementById('qv-title').textContent   = `Pregunta ${idx+1}`;
  document.getElementById('qv-sub').textContent     = `Hoja ${idx+1} de ${QUESTIONS.length}`;
  document.getElementById('qv-eyebrow').textContent = `&#9632; ${idx+1} de ${QUESTIONS.length}`;
  document.getElementById('qv-question').textContent = q.label;
  document.getElementById('qv-counter').textContent  = `${idx+1} / ${QUESTIONS.length}`;

  document.getElementById('btn-qprev').disabled = idx === 0;
  document.getElementById('btn-qnext').disabled = idx === QUESTIONS.length - 1;

  const list = document.getElementById('qv-answers');
  list.innerHTML = '';

  if (!entries.length) {
    list.innerHTML = `<div class="no-entries">Aún no hay entradas — ¡sé el primero!</div>`;
    return;
  }

  entries.forEach((e, i) => {
    const row  = document.createElement('div');
    row.className = 'answer-row';
    const val  = e[q.id] ? escHtml(e[q.id]) : '';
    const name = q.id === 'nombre' ? '' : `<span class="answer-name">${escHtml(e.nombre||'—')}</span>`;
    row.innerHTML = `
      <span class="answer-num">#${e.num}</span>
      ${name}
      ${val
        ? `<span class="answer-text">${val}</span>`
        : `<span class="answer-empty">sin respuesta</span>`
      }`;
    list.appendChild(row);
  });
}

/* ── NEW ENTRY FORM ── */
window.startNewEntry = function() {
  formData = {}; formStep = 0;
  document.getElementById('form-entry-label').textContent = `Entrada #${nextNum}`;
  showView('form');
  buildStep(0);
  setTab('tab-nueva');
};

function buildStep(idx) {
  const q      = QUESTIONS[idx];
  const isLast = idx === QUESTIONS.length - 1;
  const body   = document.getElementById('form-body');

  const inputEl = q.type === 'area'
    ? `<textarea class="handwritten-textarea" id="fi" rows="3" placeholder="${q.placeholder}" maxlength="300">${escAttr(formData[q.id]||'')}</textarea>`
    : `<input    class="handwritten-input"    id="fi" type="text" placeholder="${q.placeholder}" maxlength="120" value="${escAttr(formData[q.id]||'')}">`;

  body.innerHTML = `
    <div class="form-step-indicator">Pregunta ${idx+1} de ${QUESTIONS.length}</div>
    <div class="form-question">${q.label}</div>
    ${inputEl}
    <div class="form-btns">
      ${idx > 0 ? `<button class="btn-form-back" onclick="window.formBack()">&#8592;</button>` : ''}
      ${isLast
        ? `<button class="btn-submit" onclick="window.submitEntry()">Guardar en el cuaderno &#10003;</button>`
        : `<button class="btn-form-next" onclick="window.formNext()">Siguiente &#8594;</button>`
      }
    </div>`;

  setTimeout(() => { const el = document.getElementById('fi'); if (el) el.focus(); }, 60);
}

window.formNext = function() {
  const el  = document.getElementById('fi');
  const val = el ? el.value.trim() : '';
  if (!val && formStep === 0) { el.style.borderBottomColor = '#e8352a'; el.focus(); return; }
  if (val) formData[QUESTIONS[formStep].id] = val;
  formStep++;
  buildStep(formStep);
};

window.formBack = function() {
  const el = document.getElementById('fi');
  if (el) formData[QUESTIONS[formStep].id] = el.value.trim();
  formStep--;
  buildStep(formStep);
};

window.submitEntry = async function() {
  const el = document.getElementById('fi');
  if (el) formData[QUESTIONS[formStep].id] = el.value.trim();
  if (!formData.nombre) { window.showCover(); return; }

  document.getElementById('form-body').innerHTML = `
    <div class="state-center">
      <div class="spinner"></div>
      <div class="state-msg">Escribiendo en el cuaderno...</div>
    </div>`;

  try {
    await push(ref, { ...formData, num: nextNum, ts: Date.now() });
    const saved = formData.nombre;
    document.getElementById('form-body').innerHTML = `
      <div class="state-center">
        <span class="success-big">¡Listo!</span>
        <div class="state-msg">
          Tu entrada #${nextNum} ya está en el chismógrafo, ${escHtml(saved)}.<br>
          Todos la pueden leer.
        </div>
      </div>
      <div class="cover-btns" style="margin-top:1.5rem">
        <button class="btn-primary"   onclick="window.showChismografo()">Leer el chismógrafo</button>
        <button class="btn-secondary" onclick="window.showCover()">Volver a portada</button>
      </div>`;
  } catch(err) {
    document.getElementById('form-body').innerHTML = `
      <div class="state-center">
        <span class="success-big" style="color:var(--red-ink)">Error</span>
        <div class="state-msg">${err.message}</div>
      </div>
      <div class="cover-btns" style="margin-top:1rem">
        <button class="btn-secondary" onclick="window.startNewEntry()">Intentar de nuevo</button>
      </div>`;
  }
};

function escHtml(s='') {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function escAttr(s='') {
  return String(s).replace(/"/g,'&quot;');
}
</script>
</body>
</html>
