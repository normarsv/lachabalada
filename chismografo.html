<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Chismógrafo · La Chabalada</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='4' fill='%23faf6ea'/><line x1='8' y1='8' x2='24' y2='8' stroke='%23c8bfa8' stroke-width='1'/><line x1='8' y1='12' x2='24' y2='12' stroke='%23c8bfa8' stroke-width='1'/><line x1='8' y1='16' x2='24' y2='16' stroke='%23c8bfa8' stroke-width='1'/><line x1='8' y1='20' x2='24' y2='20' stroke='%23c8bfa8' stroke-width='1'/><line x1='8' y1='24' x2='24' y2='24' stroke='%23c8bfa8' stroke-width='1'/><line x1='11' y1='4' x2='11' y2='28' stroke='%23e8a0a0' stroke-width='1.2'/><text x='16' y='19' font-family='serif' font-size='11' fill='%231a3a6b' text-anchor='middle' font-style='italic'>Ch</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Permanent+Marker&family=Bebas+Neue&family=Patrick+Hand&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --paper:      #faf6ea;
  --paper2:     #f2ecda;
  --paper3:     #e8e0ca;
  --lines:      #d4c9b0;
  --lines-dark: #bfb09a;
  --margin:     #e8a0a0;
  --ink:        #1c1408;
  --ink-mid:    #3a2a14;
  --ink-faded:  #7a6448;
  --blue-ink:   #1a3560;
  --red-ink:    #8b1a1a;
  --red:        #c0281e;
  --red-bright: #e8352a;
  --black:      #090909;
  --spiral:     #888;
  --spiral-dark:#555;
  /* layout */
  --margin-w:   52px;  /* width of left margin zone */
  --binding-w:  38px;  /* width of spiral binding */
  --line-h:     34px;  /* ruled line height */
}

html { height: 100%; }

body {
  min-height: 100%;
  background: #18110a;
  background-image:
    radial-gradient(ellipse at 20% 60%, rgba(55,30,8,.5) 0%, transparent 55%),
    radial-gradient(ellipse at 85% 15%, rgba(35,18,3,.4) 0%, transparent 50%);
  font-family: 'Patrick Hand', cursive;
  overflow-x: hidden;
}

/* ── NAV ── */
nav {
  display: flex; align-items: center; justify-content: space-between;
  padding: .8rem 1.25rem;
  background: rgba(8,6,2,.92); backdrop-filter: blur(8px);
  border-bottom: 1px solid rgba(192,40,30,.18);
  position: sticky; top: 0; z-index: 50;
}
.nav-logo {
  font-family: 'Permanent Marker', cursive;
  font-size: 19px; color: var(--red);
  text-decoration: none;
  text-shadow: 0 0 12px rgba(192,40,30,.35);
}
.nav-back {
  font-family: 'Bebas Neue', sans-serif; font-size: 11px; letter-spacing: 4px;
  color: rgba(240,236,228,.35); text-decoration: none; transition: color .2s;
}
.nav-back:hover { color: var(--red-bright); }

/* ── OUTER WRAPPER ── */
.outer {
  display: flex; flex-direction: column; align-items: center;
  padding: 2rem 1rem 5rem;
}

/* ── NOTEBOOK SHELL ── */
/* The notebook is: [binding strip] + [page]
   binding strip holds the SVG spiral rings
   page holds all content                        */
.notebook {
  width: 100%;
  max-width: 720px;
  display: flex;
  border-radius: 3px 8px 8px 3px;
  box-shadow:
    4px 4px 0 rgba(0,0,0,.35),
    8px 8px 0 rgba(0,0,0,.18),
    14px 14px 0 rgba(0,0,0,.08);
  min-height: 560px;
}

/* Binding strip */
.binding {
  width: var(--binding-w);
  flex-shrink: 0;
  background: var(--paper2);
  border-right: 3px solid #cac0a8;
  border-radius: 3px 0 0 3px;
  position: relative;
  display: flex; flex-direction: column;
  align-items: center;
  padding: 14px 0;
  gap: 0;
  justify-content: space-evenly;
}

/* Each ring drawn in pure CSS — consistent circles */
.ring {
  width: 22px; height: 22px; border-radius: 50%;
  border: 3px solid var(--spiral);
  background: #18110a;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.08),
    0 1px 2px rgba(0,0,0,.5);
  flex-shrink: 0;
  position: relative;
}
/* little highlight on each ring */
.ring::before {
  content: '';
  position: absolute; top: 3px; left: 4px;
  width: 6px; height: 4px; border-radius: 50%;
  background: rgba(255,255,255,.12);
}

/* Page */
.page {
  flex: 1; min-width: 0;
  background: var(--paper);
  border-radius: 0 8px 8px 0;
  position: relative; overflow: hidden;
}

/* Ruled lines — start after header area */
.page::before {
  content: ''; position: absolute; inset: 0; pointer-events: none; z-index: 0;
  background-image: repeating-linear-gradient(
    to bottom,
    transparent 0px, transparent calc(var(--line-h) - 1px),
    var(--lines) calc(var(--line-h) - 1px), var(--lines) var(--line-h)
  );
  background-position: 0 64px;
}

/* Red margin line */
.page::after {
  content: ''; position: absolute;
  top: 0; bottom: 0; left: var(--margin-w);
  width: 1.5px; background: var(--margin);
  pointer-events: none; z-index: 1;
}

/* ── PAGE HEADER ── */
.page-header {
  position: relative; z-index: 2;
  padding: .75rem 1.25rem .6rem calc(var(--margin-w) + 14px);
  border-bottom: 2px solid var(--lines-dark);
  min-height: 64px; display: flex; flex-direction: column; justify-content: flex-end;
}
.page-title {
  font-family: 'Permanent Marker', cursive;
  font-size: clamp(22px, 5vw, 30px); color: var(--red);
  line-height: 1.05;
}
.page-subtitle {
  font-family: 'Patrick Hand', cursive;
  font-size: 14px; color: var(--ink-faded); margin-top: 2px;
}

/* ── PAGE BODY ── */
.page-body {
  position: relative; z-index: 2;
  padding: 1rem 1.25rem 1.75rem calc(var(--margin-w) + 14px);
}

/* ── COVER VIEW ── */
.cover-hero {
  text-align: center; padding: 1.25rem .5rem 1rem;
}
.cover-big {
  font-family: 'Permanent Marker', cursive;
  font-size: clamp(70px, 18vw, 100px); line-height: 1;
  color: var(--paper3);
  text-shadow: 2px 2px 0 rgba(0,0,0,.06);
}
.cover-label {
  font-family: 'Caveat', cursive; font-weight: 600;
  font-size: 20px; color: var(--ink-mid); margin-top: 4px;
}
.cover-doodle {
  font-family: 'Patrick Hand', cursive;
  font-size: 13px; color: var(--ink-faded); opacity: .5;
  border-top: 1px dashed var(--lines); border-bottom: 1px dashed var(--lines);
  padding: .2rem 0; margin: .85rem auto; max-width: 260px;
}
.cover-eyebrow {
  font-family: 'Bebas Neue', sans-serif; font-size: 10px; letter-spacing: 5px;
  color: var(--red); opacity: .5; display: block; margin-bottom: .2rem;
}

/* ── BUTTONS ── */
.cover-btns { display: flex; flex-direction: column; gap: .6rem; margin-top: 1.25rem; }
.btn-primary {
  display: block; width: 100%;
  font-family: 'Bebas Neue', sans-serif; font-size: 14px; letter-spacing: 5px;
  color: #fff; background: var(--red-bright); border: none;
  padding: 12px 8px; cursor: pointer;
  clip-path: polygon(4px 0%,100% 0%,calc(100% - 4px) 100%,0% 100%);
  transition: background .15s;
}
.btn-primary:hover { background: #ff3d31; }
.btn-secondary {
  display: block; width: 100%;
  font-family: 'Bebas Neue', sans-serif; font-size: 14px; letter-spacing: 5px;
  color: var(--ink-mid); background: none;
  border: 1.5px solid rgba(42,31,14,.22);
  padding: 11px 8px; cursor: pointer; border-radius: 2px; transition: all .15s;
}
.btn-secondary:hover { border-color: var(--ink-mid); background: rgba(42,31,14,.05); }

/* ── QUESTION VIEW ── */
.q-eyebrow {
  font-family: 'Bebas Neue', sans-serif; font-size: 10px; letter-spacing: 5px;
  color: var(--red); opacity: .5; margin-bottom: .4rem;
}
.q-question {
  font-family: 'Permanent Marker', cursive;
  font-size: clamp(16px, 3.5vw, 20px); color: var(--ink-mid);
  line-height: 1.35; margin-bottom: 1rem;
  padding-bottom: .65rem;
  border-bottom: 1px dashed var(--lines-dark);
}

/* Answer rows — consistent baseline alignment */
.answers-list { display: flex; flex-direction: column; }
.answer-row {
  display: grid;
  grid-template-columns: 28px 90px 1fr;
  align-items: baseline;
  gap: 0 8px;
  padding: 5px 0;
  border-bottom: 1px solid rgba(212,201,176,.4);
  min-height: var(--line-h);
}
.answer-num {
  font-family: 'Bebas Neue', sans-serif; font-size: 11px;
  color: var(--red); opacity: .6; letter-spacing: 1px;
  padding-top: 2px;
}
.answer-name {
  font-family: 'Patrick Hand', cursive;
  font-size: 13px; color: var(--ink-faded);
  font-style: italic; overflow: hidden;
  text-overflow: ellipsis; white-space: nowrap;
}
.answer-text {
  font-family: 'Patrick Hand', cursive;
  font-size: clamp(15px, 3.5vw, 17px); color: var(--blue-ink);
  line-height: 1.4;
}
.answer-text.solo {
  grid-column: 2 / -1;
}
.answer-empty {
  font-family: 'Patrick Hand', cursive;
  font-size: 13px; color: var(--lines-dark); font-style: italic;
  grid-column: 2 / -1;
}
.no-entries {
  font-family: 'Caveat', cursive; font-size: 18px;
  color: var(--ink-faded); text-align: center;
  padding: 2rem 1rem; opacity: .55;
}

/* Page nav */
.page-nav {
  display: flex; align-items: center; justify-content: space-between;
  margin-top: 1.25rem; padding-top: .65rem;
  border-top: 1px dashed var(--lines-dark);
  gap: .5rem;
}
.nav-btn {
  font-family: 'Bebas Neue', sans-serif; font-size: 11px; letter-spacing: 3px;
  background: none; border: 1px solid rgba(42,31,14,.18);
  color: var(--ink-faded); padding: 7px 14px; cursor: pointer;
  border-radius: 2px; transition: all .15s; white-space: nowrap;
}
.nav-btn:hover { border-color: var(--red); color: var(--red); }
.nav-btn:disabled { opacity: .18; cursor: default; }
.page-counter {
  font-family: 'Caveat', cursive; font-size: 15px;
  color: var(--ink-faded); text-align: center; flex: 1;
}

/* ── FORM ── */
.form-indicator {
  font-family: 'Bebas Neue', sans-serif; font-size: 10px; letter-spacing: 5px;
  color: var(--red); opacity: .5; margin-bottom: 1rem;
}
.form-question {
  font-family: 'Permanent Marker', cursive;
  font-size: clamp(16px, 3.5vw, 20px); color: var(--ink-mid);
  line-height: 1.35; margin-bottom: 1rem;
}
.hw-input {
  width: 100%; background: transparent; border: none;
  border-bottom: 1.5px solid var(--lines-dark);
  font-family: 'Patrick Hand', cursive; font-size: clamp(18px, 4vw, 22px);
  color: var(--blue-ink); padding: 6px 0 4px;
  outline: none; transition: border-color .2s; margin-bottom: 1rem;
  -webkit-appearance: none;
}
.hw-input:focus { border-bottom-color: var(--blue-ink); }
.hw-input::placeholder { color: var(--lines-dark); }
.hw-area {
  width: 100%; background: transparent; border: none;
  border-bottom: 1.5px solid var(--lines-dark);
  font-family: 'Patrick Hand', cursive; font-size: clamp(17px, 3.8vw, 20px);
  color: var(--blue-ink); padding: 6px 0 4px;
  outline: none; resize: none; line-height: var(--line-h);
  transition: border-color .2s; margin-bottom: 1rem;
  -webkit-appearance: none;
}
.hw-area:focus { border-bottom-color: var(--blue-ink); }
.hw-area::placeholder { color: var(--lines-dark); }
.form-btns { display: flex; gap: .6rem; margin-top: .5rem; }
.btn-next {
  flex: 1; font-family: 'Bebas Neue', sans-serif;
  font-size: 13px; letter-spacing: 4px;
  background: var(--ink); color: var(--paper); border: none;
  padding: 11px; cursor: pointer; border-radius: 2px; transition: opacity .15s;
}
.btn-next:hover { opacity: .78; }
.btn-back {
  font-family: 'Bebas Neue', sans-serif; font-size: 12px; letter-spacing: 3px;
  background: none; border: 1px solid rgba(42,31,14,.2);
  color: var(--ink-faded); padding: 11px 14px; cursor: pointer; border-radius: 2px;
}
.btn-back:hover { border-color: var(--ink); color: var(--ink); }
.btn-submit {
  width: 100%; font-family: 'Bebas Neue', sans-serif;
  font-size: 14px; letter-spacing: 5px;
  background: var(--red-bright); color: #fff; border: none;
  padding: 13px; cursor: pointer;
  clip-path: polygon(3px 0%,100% 0%,calc(100% - 3px) 100%,0% 100%);
  transition: background .15s;
}
.btn-submit:hover { background: #ff3d31; }

/* State */
.state-box { text-align: center; padding: 2rem 1rem; }
.spinner {
  width: 30px; height: 30px;
  border: 2px solid rgba(42,31,14,.1); border-top-color: var(--red);
  border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 1rem;
}
@keyframes spin { to { transform: rotate(360deg); } }
.state-msg { font-family: 'Caveat', cursive; font-size: 19px; color: var(--ink-faded); }
.success-big {
  font-family: 'Permanent Marker', cursive;
  font-size: 26px; color: var(--red); display: block; margin-bottom: .5rem;
}

/* ── TABS ── */
.tabs {
  display: flex; gap: .4rem; margin-top: 1.25rem;
  justify-content: center; flex-wrap: wrap;
}
.tab {
  font-family: 'Bebas Neue', sans-serif; font-size: 11px; letter-spacing: 3px;
  background: rgba(245,240,224,.05); border: 1px solid rgba(245,240,224,.1);
  color: rgba(245,240,224,.35); padding: 6px 16px; cursor: pointer;
  border-radius: 2px; transition: all .15s;
}
.tab:hover, .tab.active {
  background: rgba(192,40,30,.14); border-color: var(--red); color: var(--red-bright);
}

/* ── SVG DOODLES ── */
.doodle-svg {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  pointer-events: none; z-index: 1; overflow: visible;
}

/* ── MOBILE ── */
@media (max-width: 600px) {
  .outer { padding: .75rem 0 4rem; }
  .notebook { border-radius: 0 4px 4px 0; max-width: 100%; }
  --binding-w: 32px;
  .binding { width: 32px; gap: 0; }
  .ring { width: 18px; height: 18px; }
  .page::after { left: 44px; }
  .page-header { padding-left: calc(44px + 10px); }
  .page-body { padding-left: calc(44px + 10px); padding-right: 1rem; }
  .answer-row { grid-template-columns: 24px 72px 1fr; gap: 0 6px; }
  .answer-name { font-size: 12px; }
  .answer-text { font-size: 15px; }
  .tabs { padding: 0 .5rem; }
}

@media (max-width: 380px) {
  .answer-row { grid-template-columns: 22px 60px 1fr; }
  .answer-name { display: none; }
  .answer-text.solo, .answer-empty { grid-column: 2 / -1; }
}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">La Chabalada</a>
  <a href="index.html" class="nav-back">&#8592; Volver</a>
</nav>

<div class="outer">
  <div style="width:100%;max-width:720px;">

    <div class="notebook" id="notebook">

      <!-- BINDING STRIP WITH RINGS -->
      <div class="binding" id="binding"></div>

      <!-- PAGE -->
      <div class="page" id="page">

        <!-- SVG margin doodles -->
        <svg class="doodle-svg" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <filter id="pen">
              <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="3" seed="9"/>
              <feDisplacementMap in="SourceGraphic" scale="1.0" xChannelSelector="R" yChannelSelector="G"/>
            </filter>
          </defs>
          <!-- flower -->
          <g transform="translate(26,85) rotate(-5)" filter="url(#pen)" opacity=".32">
            <circle cx="0" cy="0" r="3.5" fill="none" stroke="#1a3a6b" stroke-width="1.3"/>
            <ellipse cx="0" cy="-8" rx="3" ry="5" fill="none" stroke="#1a3a6b" stroke-width="1.1"/>
            <ellipse cx="0" cy="-8" rx="3" ry="5" fill="none" stroke="#1a3a6b" stroke-width="1.1" transform="rotate(60)"/>
            <ellipse cx="0" cy="-8" rx="3" ry="5" fill="none" stroke="#1a3a6b" stroke-width="1.1" transform="rotate(120)"/>
            <ellipse cx="0" cy="-8" rx="3" ry="5" fill="none" stroke="#1a3a6b" stroke-width="1.1" transform="rotate(180)"/>
            <ellipse cx="0" cy="-8" rx="3" ry="5" fill="none" stroke="#1a3a6b" stroke-width="1.1" transform="rotate(240)"/>
            <ellipse cx="0" cy="-8" rx="3" ry="5" fill="none" stroke="#1a3a6b" stroke-width="1.1" transform="rotate(300)"/>
            <line x1="0" y1="4" x2="0" y2="18" stroke="#1a3a6b" stroke-width="1.2" stroke-linecap="round"/>
          </g>
          <!-- heart -->
          <g transform="translate(26,210) rotate(-3)" filter="url(#pen)" opacity=".3">
            <path d="M0,7 C-2,3 -10,1 -10,-5 C-10,-10 -5,-13 0,-9 C5,-13 10,-10 10,-5 C10,1 2,3 0,7Z" fill="none" stroke="#8b1a1a" stroke-width="1.4"/>
          </g>
          <!-- star -->
          <g transform="translate(26,330) rotate(10)" filter="url(#pen)" opacity=".28">
            <path d="M0,-12 L2.5,-4 L10,-4 L4,1 L6,9 L0,4 L-6,9 L-4,1 L-10,-4 L-2.5,-4 Z" fill="none" stroke="#1a3a6b" stroke-width="1.3" stroke-linejoin="round"/>
          </g>
          <!-- peace -->
          <g transform="translate(26,450) rotate(4)" filter="url(#pen)" opacity=".28">
            <circle cx="0" cy="0" r="10" fill="none" stroke="#1a3a6b" stroke-width="1.3"/>
            <line x1="0" y1="-10" x2="0" y2="10" stroke="#1a3a6b" stroke-width="1.3"/>
            <line x1="0" y1="0" x2="-8.7" y2="5" stroke="#1a3a6b" stroke-width="1.3"/>
            <line x1="0" y1="0" x2="8.7"  y2="5" stroke="#1a3a6b" stroke-width="1.3"/>
          </g>
          <!-- wavy underline -->
          <g transform="translate(16,560)" filter="url(#pen)" opacity=".22">
            <path d="M0,0 Q5,-4 10,0 Q15,4 20,0 Q25,-4 30,0 Q35,4 40,0" fill="none" stroke="#1a3a6b" stroke-width="1.2" stroke-linecap="round"/>
          </g>
          <!-- bottom text -->
          <g transform="translate(50,590) rotate(-1.5)" filter="url(#pen)" opacity=".2">
            <text font-family="Caveat,cursive" font-size="11" fill="#8b1a1a" font-style="italic">La Chabalada '06</text>
          </g>
        </svg>

        <!-- COVER -->
        <div id="view-cover">
          <div class="page-header">
            <div class="page-title">Chismógrafo</div>
            <div class="page-subtitle">La Chabalada · Generación 2006</div>
          </div>
          <div class="page-body">
            <div class="cover-hero">
              <div class="cover-doodle">~ el cuaderno que todos querían leer ~</div>
              <div class="cover-big" id="cover-num">0</div>
              <div class="cover-label">entradas registradas</div>
              <span class="cover-eyebrow" id="cover-sub" style="margin-top:.4rem">cargando...</span>
            </div>
            <div class="cover-btns">
              <button class="btn-primary"   onclick="window.startNewEntry()">+ Agregar mi entrada</button>
              <button class="btn-secondary" onclick="window.showChismografo()">Leer el chismógrafo</button>
            </div>
          </div>
        </div>

        <!-- QUESTION VIEW -->
        <div id="view-questions" style="display:none">
          <div class="page-header">
            <div class="page-title" id="qv-title">—</div>
            <div class="page-subtitle" id="qv-sub">—</div>
          </div>
          <div class="page-body">
            <div class="q-eyebrow" id="qv-eyebrow"></div>
            <div class="q-question" id="qv-question"></div>
            <div class="answers-list" id="qv-answers"></div>
            <div class="page-nav">
              <button class="nav-btn" id="btn-qprev" onclick="window.goQuestion(-1)">&#8592; ant.</button>
              <span class="page-counter" id="qv-counter"></span>
              <button class="nav-btn" id="btn-qnext" onclick="window.goQuestion(1)">sig. &#8594;</button>
            </div>
            <div class="cover-btns" style="margin-top:1rem">
              <button class="btn-primary"   onclick="window.startNewEntry()">+ Agregar mi entrada</button>
              <button class="btn-secondary" onclick="window.showCover()">&#8592; Portada</button>
            </div>
          </div>
        </div>

        <!-- FORM VIEW -->
        <div id="view-form" style="display:none">
          <div class="page-header">
            <div class="page-title">Nueva entrada</div>
            <div class="page-subtitle" id="form-label">Entrada #—</div>
          </div>
          <div class="page-body" id="form-body"></div>
        </div>

      </div><!-- /page -->
    </div><!-- /notebook -->

    <!-- TABS -->
    <div class="tabs">
      <button class="tab active" id="tab-portada"     onclick="window.showCover()">Portada</button>
      <button class="tab"        id="tab-leer"        onclick="window.showChismografo()">Leer chismógrafo</button>
      <button class="tab"        id="tab-nueva"       onclick="window.startNewEntry()">+ Nueva entrada</button>
    </div>

  </div>
</div>

<!-- Firebase -->
<script type="module">
import { initializeApp }                             from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref as dbRef, push, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey:            "AIzaSyCkdH0PK5OWd9UTsmHtrT327MWnf0jIAbc",
  authDomain:        "lachabalada-6c3c3.firebaseapp.com",
  databaseURL:       "https://lachabalada-6c3c3-default-rtdb.firebaseio.com",
  projectId:         "lachabalada-6c3c3",
  storageBucket:     "lachabalada-6c3c3.firebasestorage.app",
  messagingSenderId: "412828348018",
  appId:             "1:412828348018:web:2bf7de6ebdd6ba5e8e1ceb"
};
const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);
const ref = dbRef(db, 'chismografo');

const QUESTIONS = [
  { id:'nombre',   label:'¿Cómo te llamas?',                                     type:'text', placeholder:'Tu nombre completo'           },
  { id:'apodo',    label:'¿Cuál era tu apodo en La Chabalada?',                  type:'text', placeholder:'El que todos te decían...'    },
  { id:'cancion',  label:'¿Cuál era tu canción del 2006?',                       type:'text', placeholder:'La que te da pena admitir'    },
  { id:'crush',    label:'¿Quién era tu crush? (o cómo era)',                    type:'area', placeholder:'El secreto mejor guardado...' },
  { id:'recuerdo', label:'¿Cuál es el recuerdo que más tienes de la escuela?',  type:'area', placeholder:'Esa historia que no se olvida' },
  { id:'secreto',  label:'Confiesa algo que nadie sabía de ti en la escuela',   type:'area', placeholder:'Ahora puedes decirlo...'       },
  { id:'ahora',    label:'¿En qué terminaste trabajando?',                       type:'area', placeholder:'La vida adulta es rara...'    },
  { id:'consejo',  label:'¿Qué le dirías a tu yo de 17 años?',                  type:'area', placeholder:'Una sola cosa...'             },
  { id:'palabra',  label:'Una palabra para describir cómo estás hoy',            type:'text', placeholder:'Solo una'                    },
];

let entries = [], nextNum = 1, qIdx = 0, formStep = 0, formData = {};

/* ── BUILD RINGS ── */
function buildRings() {
  const binding = document.getElementById('binding');
  const pageH   = document.getElementById('page').offsetHeight || 560;
  const count   = Math.max(8, Math.floor(pageH / 48));
  binding.innerHTML = '';
  for (let i = 0; i < count; i++) {
    const r = document.createElement('div');
    r.className = 'ring';
    binding.appendChild(r);
  }
}
buildRings();
new ResizeObserver(buildRings).observe(document.getElementById('page'));

/* ── FIREBASE ── */
onValue(ref, snap => {
  const data = snap.val() || {};
  entries = Object.values(data).sort((a,b) => a.num - b.num);
  nextNum = entries.length ? entries[entries.length-1].num + 1 : 1;
  const n = entries.length;
  document.getElementById('cover-num').textContent = n;
  document.getElementById('cover-sub').textContent =
    n === 0 ? '¡sé el primero!' : `${n} chabal${n!==1?'es':'ada/e'} en el cuaderno`;
  if (document.getElementById('view-questions').style.display !== 'none') renderQ(qIdx);
});

/* ── VIEWS ── */
function showView(v) {
  ['cover','questions','form'].forEach(id =>
    document.getElementById('view-'+id).style.display = id===v ? 'block' : 'none'
  );
  setTimeout(buildRings, 50);
}
function setTab(id) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  if (id) document.getElementById(id)?.classList.add('active');
}

window.showCover = () => { showView('cover'); setTab('tab-portada'); };

window.showChismografo = () => {
  if (!entries.length) { window.showCover(); return; }
  qIdx = 0; showView('questions'); renderQ(0); setTab('tab-leer');
};

window.goQuestion = d => {
  qIdx = Math.max(0, Math.min(qIdx + d, QUESTIONS.length - 1));
  renderQ(qIdx);
  document.getElementById('notebook').scrollIntoView({ behavior:'smooth', block:'start' });
};

/* ── RENDER QUESTION ── */
function renderQ(idx) {
  const q = QUESTIONS[idx];
  document.getElementById('qv-title').textContent    = `Pregunta ${idx+1}`;
  document.getElementById('qv-sub').textContent      = `Hoja ${idx+1} de ${QUESTIONS.length}`;
  document.getElementById('qv-eyebrow').textContent  = `\u25A0 ${idx+1} de ${QUESTIONS.length}`;
  document.getElementById('qv-question').textContent = q.label;
  document.getElementById('qv-counter').textContent  = `${idx+1} / ${QUESTIONS.length}`;
  document.getElementById('btn-qprev').disabled = idx === 0;
  document.getElementById('btn-qnext').disabled = idx === QUESTIONS.length - 1;

  const list = document.getElementById('qv-answers');
  list.innerHTML = '';
  if (!entries.length) {
    list.innerHTML = `<div class="no-entries">Aún no hay entradas — ¡sé el primero!</div>`;
    return;
  }
  entries.forEach(e => {
    const row  = document.createElement('div');
    row.className = 'answer-row';
    const val  = e[q.id] ? escH(e[q.id]) : '';
    const isName = q.id === 'nombre';
    row.innerHTML = `
      <span class="answer-num">#${e.num}</span>
      ${isName ? '' : `<span class="answer-name">${escH(e.nombre||'—')}</span>`}
      ${val
        ? `<span class="answer-text${isName?' solo':''}">${val}</span>`
        : `<span class="answer-empty">—</span>`
      }`;
    list.appendChild(row);
  });
}

/* ── FORM ── */
window.startNewEntry = () => {
  formData = {}; formStep = 0;
  document.getElementById('form-label').textContent = `Entrada #${nextNum}`;
  showView('form'); buildStep(0); setTab('tab-nueva');
};

function buildStep(idx) {
  const q = QUESTIONS[idx], isLast = idx === QUESTIONS.length - 1;
  const body = document.getElementById('form-body');
  const el   = q.type === 'area'
    ? `<textarea class="hw-area" id="fi" rows="3" placeholder="${q.placeholder}" maxlength="300">${escA(formData[q.id]||'')}</textarea>`
    : `<input class="hw-input" id="fi" type="text" placeholder="${q.placeholder}" maxlength="120" value="${escA(formData[q.id]||'')}">`;
  body.innerHTML = `
    <div class="form-indicator">Pregunta ${idx+1} de ${QUESTIONS.length}</div>
    <div class="form-question">${q.label}</div>
    ${el}
    <div class="form-btns">
      ${idx > 0 ? `<button class="btn-back" onclick="window.formBack()">&#8592;</button>` : ''}
      ${isLast
        ? `<button class="btn-submit" onclick="window.submitEntry()">Guardar &#10003;</button>`
        : `<button class="btn-next" onclick="window.formNext()">Siguiente &#8594;</button>`
      }
    </div>`;
  setTimeout(() => document.getElementById('fi')?.focus(), 60);
}

window.formNext = () => {
  const el = document.getElementById('fi'), val = el?.value.trim() || '';
  if (!val && formStep === 0) { el.style.borderBottomColor='#e8352a'; el.focus(); return; }
  if (val) formData[QUESTIONS[formStep].id] = val;
  buildStep(++formStep);
};

window.formBack = () => {
  const el = document.getElementById('fi');
  if (el) formData[QUESTIONS[formStep].id] = el.value.trim();
  buildStep(--formStep);
};

window.submitEntry = async () => {
  const el = document.getElementById('fi');
  if (el) formData[QUESTIONS[formStep].id] = el.value.trim();
  if (!formData.nombre) { window.showCover(); return; }
  document.getElementById('form-body').innerHTML = `
    <div class="state-box"><div class="spinner"></div>
    <div class="state-msg">Escribiendo en el cuaderno...</div></div>`;
  try {
    await push(ref, { ...formData, num: nextNum, ts: Date.now() });
    const name = formData.nombre;
    document.getElementById('form-body').innerHTML = `
      <div class="state-box">
        <span class="success-big">¡Listo, ${escH(name)}!</span>
        <div class="state-msg">Tu entrada #${nextNum} ya está en el chismógrafo.<br>Todos la pueden leer.</div>
      </div>
      <div class="cover-btns" style="margin-top:1.25rem">
        <button class="btn-primary"   onclick="window.showChismografo()">Leer el chismógrafo</button>
        <button class="btn-secondary" onclick="window.showCover()">Portada</button>
      </div>`;
  } catch(err) {
    document.getElementById('form-body').innerHTML = `
      <div class="state-box">
        <span class="success-big" style="color:var(--red-ink)">Error</span>
        <div class="state-msg">${err.message}</div>
      </div>
      <div class="cover-btns" style="margin-top:1rem">
        <button class="btn-secondary" onclick="window.startNewEntry()">Intentar de nuevo</button>
      </div>`;
  }
};

const escH = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const escA = s => String(s).replace(/"/g,'&quot;');
</script>
</body>
</html>
