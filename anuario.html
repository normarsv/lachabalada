<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anuario · La Chabalada 2006</title>
<link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Bebas+Neue&family=Oswald:wght@300;400;600&family=Caveat:wght@400;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --black:      #090909;
  --gray:       #141414;
  --gray-mid:   #1e1e1e;
  --red:        #c0281e;
  --red-bright: #e8352a;
  --red-dark:   #7a1510;
  --white:      #f0ece4;
  --paper:      #fdfaf4;
  --paper-ink:  #6b5740;
}

html { scroll-behavior: smooth; }

body {
  background: var(--black);
  color: var(--white);
  font-family: 'Oswald', sans-serif;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed; inset: 0; z-index: 999; pointer-events: none;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='256' height='256' filter='url(%23n)' opacity='0.06'/%3E%3C/svg%3E");
  opacity: 0.5; mix-blend-mode: overlay;
}

/* ── NAV ── */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 1rem 2rem;
  background: rgba(9,9,9,0.88);
  backdrop-filter: blur(8px);
  border-bottom: 1px solid rgba(192,40,30,0.15);
}
.nav-logo {
  font-family: 'Permanent Marker', cursive;
  font-size: 22px; color: var(--red);
  text-decoration: none;
  text-shadow: 0 0 12px rgba(192,40,30,0.4);
}
.nav-back {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 12px; letter-spacing: 4px;
  color: rgba(240,236,228,0.4);
  text-decoration: none;
  transition: color 0.2s;
}
.nav-back:hover { color: var(--red-bright); }

/* ── HEADER ── */
.page-header {
  min-height: 52vh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  position: relative; overflow: hidden;
  padding: 8rem 1.5rem 4rem;
  background: radial-gradient(ellipse at 50% 60%, rgba(160,30,20,0.14) 0%, transparent 65%);
  text-align: center;
}
.header-stripe {
  position: absolute; top: 0; left: 0; right: 0; height: 5px;
  background: repeating-linear-gradient(90deg,
    var(--red) 0, var(--red) 18px, transparent 18px, transparent 26px);
}
.drips { position: absolute; inset: 0; pointer-events: none; overflow: hidden; }
.drip {
  position: absolute; top: -20px; border-radius: 0 0 4px 4px;
  background: linear-gradient(to bottom, var(--red-dark), transparent);
  animation: drip linear infinite; opacity: 0;
}
@keyframes drip {
  0%  { transform: translateY(0);     opacity: 0;   }
  8%  { opacity: .28; }
  92% { opacity: .28; }
  100%{ transform: translateY(105vh); opacity: 0;   }
}
.drip:nth-child(1){ left:7%;  width:2px; height:100px; animation-duration:7s;   animation-delay:0s;   }
.drip:nth-child(2){ left:22%; width:3px; height:75px;  animation-duration:9s;   animation-delay:2s;   }
.drip:nth-child(3){ left:38%; width:2px; height:130px; animation-duration:6.5s; animation-delay:.7s;  }
.drip:nth-child(4){ left:55%; width:4px; height:90px;  animation-duration:8.5s; animation-delay:1.5s; }
.drip:nth-child(5){ left:70%; width:2px; height:110px; animation-duration:7.5s; animation-delay:.3s;  }
.drip:nth-child(6){ left:85%; width:3px; height:70px;  animation-duration:10s;  animation-delay:3s;   }

.header-eyebrow {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 11px; letter-spacing: 6px;
  color: var(--red); opacity: .6;
  margin-bottom: 1rem; position: relative; z-index: 2;
  animation: fadeUp .8s ease both;
}
.header-logo-la {
  font-family: 'Permanent Marker', cursive;
  font-size: clamp(18px,4vw,30px);
  color: var(--red); letter-spacing: 5px;
  margin-bottom: -.1em; opacity: .9;
  text-shadow: 0 0 20px rgba(192,40,30,.45);
  position: relative; z-index: 2;
  animation: fadeUp .8s ease .1s both;
}
.header-logo {
  font-family: 'Permanent Marker', cursive;
  font-size: clamp(52px,13vw,110px);
  line-height: .92; color: var(--red-bright);
  text-shadow:
    -2px -2px 0 var(--red-dark),
     2px  2px 0 var(--red-dark),
     0 0 40px rgba(232,53,42,.3),
     0 0 90px rgba(192,40,30,.12);
  letter-spacing: -2px;
  position: relative; z-index: 2;
  animation: fadeUp .8s ease .15s both;
}
.header-sub {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(18px,3.5vw,30px);
  letter-spacing: 5px; color: var(--white); opacity: .32;
  margin-top: .4em; position: relative; z-index: 2;
  animation: fadeUp .8s ease .25s both;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── GALLERY ── */
.gallery-wrap {
  max-width: 1140px; margin: 0 auto;
  padding: 4rem 2rem 7rem;
}
.gallery-meta {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 3rem; flex-wrap: wrap; gap: 1rem;
  border-bottom: 1px solid rgba(192,40,30,.18);
  padding-bottom: 1.5rem;
}
.meta-count {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 13px; letter-spacing: 5px;
  color: rgba(240,236,228,.28);
}
.meta-count span { color: var(--red-bright); }

.filter-btns { display: flex; gap: 8px; flex-wrap: wrap; }
.filter-btn {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 11px; letter-spacing: 3px;
  padding: 6px 16px; background: none;
  border: 1px solid rgba(192,40,30,.22);
  color: rgba(240,236,228,.32); cursor: pointer;
  border-radius: 2px; transition: all .15s;
}
.filter-btn:hover, .filter-btn.active {
  border-color: var(--red);
  color: var(--red-bright);
  background: rgba(192,40,30,.08);
}

/* MASONRY GRID */
.grid {
  columns: 4 210px;
  column-gap: 2rem;
}

@keyframes popIn {
  from { opacity: 0; transform: scale(.9) rotate(var(--rot,0deg)); }
  to   { opacity: 1; transform: scale(1)  rotate(var(--rot,0deg)); }
}

.polaroid {
  break-inside: avoid;
  background: var(--paper);
  padding: 10px 10px 46px;
  margin-bottom: 2rem;
  box-shadow: 2px 4px 0 rgba(0,0,0,.5), 6px 10px 0 rgba(0,0,0,.18);
  position: relative; cursor: pointer;
  display: inline-block; width: 100%;
  animation: popIn .45s ease both;
  transition: transform .25s ease, box-shadow .25s ease;
  transform: rotate(var(--rot, 0deg));
}
.polaroid:nth-child(5n)   { --rot: -1.8deg; }
.polaroid:nth-child(5n+1) { --rot:  1.4deg; }
.polaroid:nth-child(5n+2) { --rot: -0.7deg; }
.polaroid:nth-child(5n+3) { --rot:  2.2deg; }
.polaroid:nth-child(5n+4) { --rot: -1.3deg; }
.polaroid:hover {
  transform: rotate(0deg) scale(1.05) translateY(-5px);
  box-shadow: 5px 14px 0 rgba(0,0,0,.55), 14px 28px 0 rgba(0,0,0,.15);
  z-index: 20;
}

.tape {
  position: absolute; top: -12px; left: 50%; transform: translateX(-50%);
  width: 52px; height: 18px;
  background: rgba(220,210,162,.5);
  border-left: .5px solid rgba(200,185,128,.28);
  border-right: .5px solid rgba(200,185,128,.28);
}
.tape::after {
  content: ''; position: absolute; inset: 2px;
  background: repeating-linear-gradient(90deg,
    rgba(255,255,255,.1) 0, rgba(255,255,255,.1) 4px,
    transparent 4px, transparent 8px);
}

.photo-wrap {
  width: 100%; overflow: hidden;
  background: #2a2520;
  display: flex; align-items: center; justify-content: center;
  min-height: 120px;
}
.photo-wrap img {
  width: 100%; display: block;
  filter: sepia(25%) contrast(.94) brightness(.97) saturate(.88);
  transition: filter .35s;
}
.polaroid:hover .photo-wrap img {
  filter: sepia(6%) contrast(1.02) brightness(1.02) saturate(1.05);
}
.photo-err {
  font-family: 'Caveat', cursive; font-size: 13px;
  color: #888; text-align: center; padding: 2rem 1rem;
  opacity: .5; letter-spacing: 1px; width: 100%;
  min-height: 120px; display: flex;
  align-items: center; justify-content: center;
}

.caption {
  font-family: 'Caveat', cursive; font-size: 15px;
  color: var(--paper-ink); text-align: center;
  line-height: 1.3; overflow: hidden;
  text-overflow: ellipsis; white-space: nowrap;
  padding: 0 4px;
  position: absolute; bottom: 11px; left: 10px; right: 10px;
}

/* ── STATE ── */
.state-box { max-width: 500px; margin: 6rem auto; text-align: center; }
.spinner {
  width: 36px; height: 36px;
  border: 2px solid rgba(240,236,228,.07);
  border-top-color: rgba(192,40,30,.65);
  border-radius: 50%;
  animation: spin .85s linear infinite;
  margin: 0 auto 1.25rem;
}
@keyframes spin { to { transform: rotate(360deg); } }
.state-text {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 17px; letter-spacing: 5px;
  color: rgba(240,236,228,.3);
}
.error-box {
  border: 1px dashed rgba(192,40,30,.3);
  border-radius: 4px; padding: 2.5rem 2rem;
  font-family: 'Caveat', cursive; font-size: 19px;
  color: rgba(240,236,228,.4); line-height: 1.7;
}
.error-box strong {
  display: block; font-size: 24px; margin-bottom: .5rem;
  font-family: 'Bebas Neue', sans-serif; letter-spacing: 3px;
  color: rgba(240,236,228,.55);
}

/* ── LIGHTBOX ── */
.lb-bg {
  display: none; position: fixed; inset: 0;
  background: rgba(4,2,0,.97); z-index: 1000;
  padding: 2rem; align-items: center;
  justify-content: center; flex-direction: column;
}
.lb-bg.open { display: flex; }
.lb-frame {
  background: var(--paper); padding: 12px 12px 54px;
  max-width: min(92vw, 820px);
  box-shadow: 0 0 120px rgba(0,0,0,.95); position: relative;
}
.lb-frame img {
  display: block; width: 100%; max-height: 65vh;
  object-fit: contain; filter: sepia(10%) contrast(.97);
}
.lb-cap {
  font-family: 'Caveat', cursive; font-size: 19px;
  color: var(--paper-ink); text-align: center;
  position: absolute; bottom: 13px; left: 0; right: 0;
}
.lb-close {
  position: absolute; top: -2.6rem; right: 0;
  background: none; border: none;
  font-size: 28px; color: rgba(240,236,228,.3);
  cursor: pointer; line-height: 1;
}
.lb-close:hover { color: rgba(240,236,228,.8); }
.lb-nav { display: flex; gap: 1.5rem; margin-top: 1.5rem; }
.lb-nav button {
  background: none; border: 1px solid rgba(240,236,228,.15);
  color: rgba(240,236,228,.4);
  font-family: 'Bebas Neue', sans-serif;
  font-size: 12px; letter-spacing: 3px;
  padding: 8px 22px; cursor: pointer; border-radius: 2px;
  transition: all .15s;
}
.lb-nav button:hover { border-color: var(--red); color: var(--red-bright); }
.lb-counter {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 11px; letter-spacing: 4px;
  color: rgba(240,236,228,.22); margin-top: .75rem;
}

/* ── FOOTER ── */
footer {
  background: var(--gray); padding: 3rem 2rem; text-align: center;
  border-top: 1px solid rgba(192,40,30,.18);
}
.foot-logo {
  font-family: 'Permanent Marker', cursive;
  font-size: 26px; color: var(--red); opacity: .38; margin-bottom: .5rem;
}
.foot-sub {
  font-size: 11px; letter-spacing: 3px;
  color: rgba(240,236,228,.16); font-weight: 300;
}
.foot-back {
  display: inline-block; margin-top: 1.5rem;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 12px; letter-spacing: 4px;
  color: rgba(240,236,228,.26); text-decoration: none;
  transition: color .2s;
}
.foot-back:hover { color: var(--red-bright); }

@media (max-width: 600px) {
  .grid { columns: 2 130px; column-gap: 1rem; }
  .polaroid { margin-bottom: 1.25rem; }
  .gallery-meta { flex-direction: column; align-items: flex-start; }
}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">La Chabalada</a>
  <a href="index.html" class="nav-back">&#8592;&nbsp; Volver</a>
</nav>

<header class="page-header">
  <div class="header-stripe"></div>
  <div class="drips">
    <div class="drip"></div><div class="drip"></div><div class="drip"></div>
    <div class="drip"></div><div class="drip"></div><div class="drip"></div>
  </div>
  <div style="position:absolute;width:400px;height:400px;border-radius:50%;
    background:radial-gradient(circle,rgba(192,40,30,.08) 0%,transparent 70%);
    top:5%;right:-8%;pointer-events:none;"></div>

  <div class="header-eyebrow">&#9632;&nbsp; Generación 2006 &nbsp;&#9632;</div>
  <div class="header-logo-la">La</div>
  <div class="header-logo">Chabalada</div>
  <div class="header-sub">Anuario &nbsp;·&nbsp; 20 años después</div>
</header>

<div class="gallery-wrap">
  <div class="gallery-meta">
    <div class="meta-count" id="meta-count">Cargando...</div>
    <div class="filter-btns">
      <button class="filter-btn active" onclick="sortBy('original', this)">Original</button>
      <button class="filter-btn" onclick="sortBy('name', this)">A — Z</button>
      <button class="filter-btn" onclick="sortBy('random', this)">Aleatorio</button>
    </div>
  </div>

  <div id="state-area">
    <div class="state-box">
      <div class="spinner"></div>
      <div class="state-text">Revelando las fotos...</div>
    </div>
  </div>

  <div class="grid" id="grid"></div>
</div>

<footer>
  <div class="foot-logo">La Chabalada</div>
  <div class="foot-sub">Generación 2006 &nbsp;·&nbsp; Navojoa, Sonora &nbsp;·&nbsp; lachabalada.com</div>
  <a href="index.html" class="foot-back">&#8592;&nbsp; Volver al inicio</a>
</footer>

<div class="lb-bg" id="lb">
  <div class="lb-frame">
    <button class="lb-close" onclick="closeLb()">&#215;</button>
    <img id="lb-img" src="" alt="">
    <div class="lb-cap" id="lb-cap"></div>
  </div>
  <div class="lb-nav">
    <button onclick="lbStep(-1)">&#8592; anterior</button>
    <button onclick="lbStep(1)">siguiente &#8594;</button>
  </div>
  <div class="lb-counter" id="lb-counter"></div>
</div>

<script>
/* ── CONFIG ── */
const GITHUB_USER = 'normarsv';
const GITHUB_REPO = 'lachabalada';
const GITHUB_BRANCH = 'main';
const PHOTOS_FOLDER = 'fotos';

/* Raw URL base for serving actual images */
const RAW_BASE = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/${GITHUB_BRANCH}/${PHOTOS_FOLDER}/`;

/* GitHub Contents API — works for public repos, no auth needed */
const API_URL = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${PHOTOS_FOLDER}?ref=${GITHUB_BRANCH}`;

const IMAGE_EXT = /\.(jpe?g|png|gif|webp|bmp|tiff?)$/i;

let allFiles = [];
let displayed = [];
let lbIdx = 0;

function friendly(name) {
  return name.replace(/\.[^.]+$/, '').replace(/[_\-]+/g, ' ').trim();
}

/* ── LOAD ── */
async function loadPhotos() {
  try {
    const res = await fetch(API_URL, {
      headers: { 'Accept': 'application/vnd.github.v3+json' }
    });
    if (!res.ok) throw new Error('GitHub API ' + res.status);
    const data = await res.json();

    allFiles = data
      .filter(f => f.type === 'file' && IMAGE_EXT.test(f.name))
      .map(f => ({ name: f.name, src: RAW_BASE + encodeURIComponent(f.name) }));

    if (allFiles.length === 0) {
      showEmpty();
    } else {
      displayed = [...allFiles];
      renderGrid(displayed);
    }
  } catch (err) {
    showError(err.message);
  }
}

/* ── RENDER ── */
function renderGrid(list) {
  document.getElementById('state-area').innerHTML = '';
  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  document.getElementById('meta-count').innerHTML =
    `<span>${list.length}</span> foto${list.length !== 1 ? 's' : ''}`;

  list.forEach((f, i) => {
    const cap = friendly(f.name);
    const card = document.createElement('div');
    card.className = 'polaroid';
    card.style.animationDelay = Math.min(i * 0.055, 2) + 's';
    card.innerHTML = `
      <div class="tape"></div>
      <div class="photo-wrap">
        <img src="${f.src}" alt="${cap}" loading="lazy"
          onerror="this.parentElement.innerHTML='<div class=\\'photo-err\\'>${cap}</div>'">
      </div>
      <div class="caption">${cap}</div>
    `;
    card.addEventListener('click', () => openLb(i));
    grid.appendChild(card);
  });
}

/* ── SORT ── */
function sortBy(method, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  let sorted = [...allFiles];
  if (method === 'name')   sorted.sort((a, b) => a.name.localeCompare(b.name));
  if (method === 'random') sorted.sort(() => Math.random() - .5);
  displayed = sorted;
  renderGrid(displayed);
}

/* ── STATES ── */
function showEmpty() {
  document.getElementById('state-area').innerHTML = `
    <div class="state-box">
      <div class="error-box">
        <strong>Sin fotos aún</strong>
        Sube imágenes a la carpeta <code style="color:var(--red-bright)">/fotos/</code>
        en tu repositorio de GitHub.
      </div>
    </div>`;
  document.getElementById('meta-count').textContent = '0 fotos';
}

function showError(msg) {
  document.getElementById('state-area').innerHTML = `
    <div class="state-box">
      <div class="error-box">
        <strong>No se pudieron cargar</strong>
        ${msg}<br><br>
        Verifica que el repositorio sea público y que la carpeta
        <code style="color:var(--red-bright)">/fotos/</code> exista.
      </div>
    </div>`;
  document.getElementById('meta-count').textContent = 'Error';
}

/* ── LIGHTBOX ── */
function openLb(idx) {
  lbIdx = idx; updateLb();
  document.getElementById('lb').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeLb() {
  document.getElementById('lb').classList.remove('open');
  document.body.style.overflow = '';
}
function lbStep(d) {
  lbIdx = (lbIdx + d + displayed.length) % displayed.length;
  updateLb();
}
function updateLb() {
  const f = displayed[lbIdx];
  document.getElementById('lb-img').src = f.src;
  document.getElementById('lb-cap').textContent = friendly(f.name);
  document.getElementById('lb-counter').textContent = (lbIdx + 1) + ' / ' + displayed.length;
}

document.getElementById('lb').addEventListener('click', e => {
  if (e.target === document.getElementById('lb')) closeLb();
});
document.addEventListener('keydown', e => {
  if (!document.getElementById('lb').classList.contains('open')) return;
  if (e.key === 'Escape')     closeLb();
  if (e.key === 'ArrowRight') lbStep(1);
  if (e.key === 'ArrowLeft')  lbStep(-1);
});

/* ── INIT ── */
loadPhotos();
</script>
</body>
</html>
