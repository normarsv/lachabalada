<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anuario · La Chabalada 2006</title>
<link rel="icon" type="image/jpeg" href="favicon.jpg">
<meta property="og:title" content="Anuario · La Chabalada 2006">
<meta property="og:description" content="Las fotos que sobrevivieron. Generación 2006 · Navojoa, Sonora.">
<meta property="og:image" content="https://lachabalada.com/og-image.jpg">
<meta property="og:url" content="https://lachabalada.com/anuario.html">
<meta name="twitter:card" content="summary_large_image">
<link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Bebas+Neue&family=Oswald:wght@300;400;600&family=Caveat:wght@400;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --black:      #090909;
  --gray:       #141414;
  --gray-mid:   #1e1e1e;
  --red:        #c0281e;
  --red-bright: #e8352a;
  --red-dark:   #7a1510;
  --white:      #f0ece4;
  --paper:      #fdfaf4;
  --paper-ink:  #6b5740;
}
html { scroll-behavior: smooth; }
body {
  background: var(--black); color: var(--white);
  font-family: 'Oswald', sans-serif; overflow-x: hidden;
}
body::before {
  content: ''; position: fixed; inset: 0; z-index: 999; pointer-events: none;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='256' height='256' filter='url(%23n)' opacity='0.06'/%3E%3C/svg%3E");
  opacity:.5; mix-blend-mode:overlay;
}

/* NAV */
nav {
  position:fixed; top:0; left:0; right:0; z-index:100;
  display:flex; align-items:center; justify-content:space-between;
  padding:1rem 2rem;
  background:rgba(9,9,9,.92); backdrop-filter:blur(8px);
  border-bottom:1px solid rgba(192,40,30,.15);
}
.nav-logo {
  font-family:'Permanent Marker',cursive; font-size:22px; color:var(--red);
  text-decoration:none; text-shadow:0 0 12px rgba(192,40,30,.4);
}
.nav-back {
  font-family:'Bebas Neue',sans-serif; font-size:12px; letter-spacing:4px;
  color:rgba(240,236,228,.4); text-decoration:none; transition:color .2s;
}
.nav-back:hover { color:var(--red-bright); }

/* HEADER */
.page-header {
  min-height:52vh; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  position:relative; overflow:hidden;
  padding:8rem 1.5rem 4rem;
  background:radial-gradient(ellipse at 50% 60%,rgba(160,30,20,.14) 0%,transparent 65%);
  text-align:center;
}
.header-stripe {
  position:absolute; top:0; left:0; right:0; height:5px;
  background:repeating-linear-gradient(90deg,var(--red) 0,var(--red) 18px,transparent 18px,transparent 26px);
}
.drips { position:absolute; inset:0; pointer-events:none; overflow:hidden; }
.drip {
  position:absolute; top:-20px; border-radius:0 0 4px 4px;
  background:linear-gradient(to bottom,var(--red-dark),transparent);
  animation:drip linear infinite; opacity:0;
}
@keyframes drip {
  0%  { transform:translateY(0);    opacity:0;  }
  8%  { opacity:.28; }
  92% { opacity:.28; }
  100%{ transform:translateY(105vh);opacity:0;  }
}
.drip:nth-child(1){left:7%;  width:2px;height:100px;animation-duration:7s;  animation-delay:0s;  }
.drip:nth-child(2){left:22%; width:3px;height:75px; animation-duration:9s;  animation-delay:2s;  }
.drip:nth-child(3){left:38%; width:2px;height:130px;animation-duration:6.5s;animation-delay:.7s; }
.drip:nth-child(4){left:55%; width:4px;height:90px; animation-duration:8.5s;animation-delay:1.5s;}
.drip:nth-child(5){left:70%; width:2px;height:110px;animation-duration:7.5s;animation-delay:.3s; }
.drip:nth-child(6){left:85%; width:3px;height:70px; animation-duration:10s; animation-delay:3s;  }

.header-eyebrow {
  font-family:'Bebas Neue',sans-serif; font-size:11px; letter-spacing:6px;
  color:var(--red); opacity:.6; margin-bottom:1rem; position:relative; z-index:2;
  animation:fadeUp .8s ease both;
}
.header-logo-la {
  font-family:'Permanent Marker',cursive; font-size:clamp(18px,4vw,30px);
  color:var(--red); letter-spacing:5px; margin-bottom:-.1em; opacity:.9;
  text-shadow:0 0 20px rgba(192,40,30,.45); position:relative; z-index:2;
  animation:fadeUp .8s ease .1s both;
}
.header-logo {
  font-family:'Permanent Marker',cursive; font-size:clamp(52px,13vw,110px);
  line-height:.92; color:var(--red-bright);
  text-shadow:-2px -2px 0 var(--red-dark),2px 2px 0 var(--red-dark),
    0 0 40px rgba(232,53,42,.3),0 0 90px rgba(192,40,30,.12);
  letter-spacing:-2px; position:relative; z-index:2;
  animation:fadeUp .8s ease .15s both;
}
.header-sub {
  font-family:'Bebas Neue',sans-serif; font-size:clamp(18px,3.5vw,30px);
  letter-spacing:5px; color:var(--white); opacity:.32;
  margin-top:.4em; position:relative; z-index:2;
  animation:fadeUp .8s ease .25s both;
}
@keyframes fadeUp {
  from{opacity:0;transform:translateY(20px);}
  to{opacity:1;transform:translateY(0);}
}

/* ── ALBUM MENU ── */
.gallery-wrap { max-width:1140px; margin:0 auto; padding:3rem 2rem 7rem; }

.album-nav-wrap {
  position: relative;
  margin-bottom: 3rem;
}
/* fade hints on sides to signal scroll */
.album-nav-wrap::before,
.album-nav-wrap::after {
  content: '';
  position: absolute; top: 0; bottom: 1px; width: 40px;
  pointer-events: none; z-index: 2;
  transition: opacity .3s;
}
.album-nav-wrap::before {
  left: 0;
  background: linear-gradient(to right, var(--black), transparent);
}
.album-nav-wrap::after {
  right: 0;
  background: linear-gradient(to left, var(--black), transparent);
}
.album-nav-wrap.no-overflow-left::before  { opacity: 0; }
.album-nav-wrap.no-overflow-right::after  { opacity: 0; }

.album-nav {
  display: flex; align-items: center; gap: 0;
  overflow-x: auto; scroll-snap-type: x proximity;
  border-bottom: 1px solid rgba(192,40,30,.18);
  padding-bottom: 0; scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
}
.album-nav::-webkit-scrollbar { display: none; }

/* scroll arrow hint on mobile */
.scroll-hint {
  display: none;
  font-family: 'Bebas Neue', sans-serif; font-size: 10px; letter-spacing: 3px;
  color: var(--red); opacity: .55; text-align: center;
  margin-bottom: .75rem; animation: pulse-hint 2s ease-in-out 3;
}
@keyframes pulse-hint {
  0%,100%{ opacity:.35; } 50%{ opacity:.75; }
}
@media(max-width:600px){
  .scroll-hint { display: block; }
}

.album-tab {
  font-family:'Bebas Neue',sans-serif; font-size:13px; letter-spacing:3px;
  color:rgba(240,236,228,.35); background:none; border:none;
  padding:.9rem 1.5rem; cursor:pointer; white-space:nowrap;
  border-bottom:2px solid transparent; margin-bottom:-1px;
  transition:color .2s, border-color .2s;
  scroll-snap-align: start;
  flex-shrink: 0;
}
.album-tab:hover { color:rgba(240,236,228,.7); }
.album-tab.active {
  color:var(--red-bright);
  border-bottom-color:var(--red-bright);
}
.album-tab .tab-count {
  font-size:10px; letter-spacing:1px; opacity:.6;
  margin-left:6px; color:inherit;
}

.gallery-meta {
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:2rem; flex-wrap:wrap; gap:1rem;
}
.btn-upload {
  font-family:'Bebas Neue',sans-serif; font-size:11px; letter-spacing:3px;
  background:none; border:1px solid rgba(192,40,30,.3);
  color:rgba(240,236,228,.45); padding:7px 16px; cursor:pointer;
  border-radius:2px; text-decoration:none; transition:all .15s; display:inline-block;
}
.btn-upload:hover { border-color:var(--red); color:var(--red-bright); }
.meta-count {
  font-family:'Bebas Neue',sans-serif; font-size:13px; letter-spacing:5px;
  color:rgba(240,236,228,.28);
}
.meta-count span { color:var(--red-bright); }

.sort-btns { display:flex; gap:8px; flex-wrap:wrap; }
.sort-btn {
  font-family:'Bebas Neue',sans-serif; font-size:11px; letter-spacing:3px;
  padding:6px 14px; background:none; border:1px solid rgba(192,40,30,.22);
  color:rgba(240,236,228,.32); cursor:pointer; border-radius:2px; transition:all .15s;
}
.sort-btn:hover,.sort-btn.active {
  border-color:var(--red); color:var(--red-bright); background:rgba(192,40,30,.08);
}

/* MASONRY */
.grid { columns:4 210px; column-gap:2rem; }

@keyframes popIn {
  from{opacity:0;transform:scale(.9) rotate(var(--rot,0deg));}
  to{opacity:1;transform:scale(1) rotate(var(--rot,0deg));}
}
.polaroid {
  break-inside:avoid; background:var(--paper); padding:10px 10px 46px;
  margin-bottom:2rem; box-shadow:2px 4px 0 rgba(0,0,0,.5),6px 10px 0 rgba(0,0,0,.18);
  position:relative; cursor:pointer; display:inline-block; width:100%;
  animation:popIn .45s ease both;
  transition:transform .25s ease, box-shadow .25s ease;
  transform:rotate(var(--rot,0deg));
}
.polaroid:nth-child(5n)  {--rot:-1.8deg;}
.polaroid:nth-child(5n+1){--rot: 1.4deg;}
.polaroid:nth-child(5n+2){--rot:-0.7deg;}
.polaroid:nth-child(5n+3){--rot: 2.2deg;}
.polaroid:nth-child(5n+4){--rot:-1.3deg;}
.polaroid:hover {
  transform:rotate(0deg) scale(1.05) translateY(-5px);
  box-shadow:5px 14px 0 rgba(0,0,0,.55),14px 28px 0 rgba(0,0,0,.15); z-index:20;
}
.polaroid.sample-card { border:2px dashed rgba(192,40,30,.3); }

.tape {
  position:absolute; top:-12px; left:50%; transform:translateX(-50%);
  width:52px; height:18px; background:rgba(220,210,162,.5);
  border-left:.5px solid rgba(200,185,128,.28); border-right:.5px solid rgba(200,185,128,.28);
}
.tape::after {
  content:''; position:absolute; inset:2px;
  background:repeating-linear-gradient(90deg,rgba(255,255,255,.1) 0,rgba(255,255,255,.1) 4px,transparent 4px,transparent 8px);
}
.photo-wrap {
  width:100%; overflow:hidden; background:#2a2520;
  display:flex; align-items:center; justify-content:center; min-height:120px;
}
.photo-wrap img { width:100%; display:block; filter:sepia(25%) contrast(.94) brightness(.97) saturate(.88); transition:filter .35s; }
.photo-wrap svg { width:100%; display:block; }
.polaroid:hover .photo-wrap img { filter:sepia(6%) contrast(1.02) brightness(1.02) saturate(1.05); }
.photo-err {
  font-family:'Caveat',cursive; font-size:13px; color:#888; text-align:center;
  padding:2rem 1rem; opacity:.5; letter-spacing:1px; width:100%;
  min-height:120px; display:flex; align-items:center; justify-content:center;
}
.caption {
  font-family:'Caveat',cursive; font-size:15px; color:var(--paper-ink); text-align:center;
  line-height:1.3; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  padding:0 4px; position:absolute; bottom:11px; left:10px; right:10px;
}
.comment-badge {
  position:absolute; top:6px; right:6px;
  background:var(--red); color:#fff;
  font-family:'Bebas Neue',sans-serif; font-size:11px; letter-spacing:1px;
  padding:2px 7px; border-radius:2px; opacity:.85;
}
.new-badge {
  position:absolute; top:6px; left:6px;
  background:#e8352a; color:#fff;
  font-family:'Bebas Neue',sans-serif; font-size:10px; letter-spacing:3px;
  padding:2px 8px; border-radius:2px; z-index:5;
  animation: new-pulse 2s ease-in-out infinite;
}
@keyframes new-pulse {
  0%,100% { opacity:1; }
  50%      { opacity:.55; }
}

/* STATE */
.state-box { max-width:500px; margin:5rem auto; text-align:center; }
.spinner {
  width:36px; height:36px; border:2px solid rgba(240,236,228,.07);
  border-top-color:rgba(192,40,30,.65); border-radius:50%;
  animation:spin .85s linear infinite; margin:0 auto 1.25rem;
}
@keyframes spin{to{transform:rotate(360deg);}}
.state-text {
  font-family:'Bebas Neue',sans-serif; font-size:17px; letter-spacing:5px;
  color:rgba(240,236,228,.3);
}
.error-box {
  border:1px dashed rgba(192,40,30,.3); border-radius:4px; padding:2.5rem 2rem;
  font-family:'Caveat',cursive; font-size:19px; color:rgba(240,236,228,.4); line-height:1.7;
}
.error-box strong {
  display:block; font-size:24px; margin-bottom:.5rem;
  font-family:'Bebas Neue',sans-serif; letter-spacing:3px; color:rgba(240,236,228,.55);
}

/* LIGHTBOX */
.lb-bg {
  display:none; position:fixed; inset:0;
  background:rgba(4,2,0,.97); z-index:1000;
  overflow-y:auto; padding:1.5rem 1rem 3rem;
}
.lb-bg.open { display:block; }
.lb-inner {
  max-width:820px; margin:0 auto;
  display:flex; flex-direction:column; align-items:center;
  padding-top:2rem;
}
.lb-top { display:flex; justify-content:flex-end; width:100%; margin-bottom:.75rem; }
.lb-close {
  background:none; border:none; font-size:28px;
  color:rgba(240,236,228,.35); cursor:pointer; line-height:1;
}
.lb-close:hover { color:rgba(240,236,228,.85); }
.lb-frame {
  background:var(--paper); padding:12px 12px 54px; width:100%;
  box-shadow:0 0 120px rgba(0,0,0,.95); position:relative;
}
.lb-frame img {
  display:block; width:100%; max-height:58vh;
  object-fit:contain; filter:sepia(10%) contrast(.97);
}
.lb-frame svg { display:block; width:100%; }
.lb-cap {
  font-family:'Caveat',cursive; font-size:19px; color:var(--paper-ink); text-align:center;
  position:absolute; bottom:13px; left:0; right:0;
}
.lb-nav { display:flex; gap:1.5rem; margin-top:1.5rem; align-items:center; }
.lb-nav button {
  background:none; border:1px solid rgba(240,236,228,.15);
  color:rgba(240,236,228,.4); font-family:'Bebas Neue',sans-serif;
  font-size:12px; letter-spacing:3px; padding:8px 22px; cursor:pointer;
  border-radius:2px; transition:all .15s;
}
.lb-nav button:hover { border-color:var(--red); color:var(--red-bright); }
.lb-counter { font-family:'Bebas Neue',sans-serif; font-size:11px; letter-spacing:4px; color:rgba(240,236,228,.22); }
.lb-album-tag {
  font-family:'Bebas Neue',sans-serif; font-size:10px; letter-spacing:4px;
  color:var(--red); opacity:.6; margin-top:.5rem;
}

/* COMMENTS */
.comments-panel {
  width:100%; margin-top:2rem;
  border-top:1px solid rgba(192,40,30,.2); padding-top:1.75rem;
}
.comments-heading {
  font-family:'Bebas Neue',sans-serif; font-size:12px; letter-spacing:6px;
  color:var(--red); opacity:.65; margin-bottom:1.25rem;
}
.comments-list { display:flex; flex-direction:column; gap:.75rem; margin-bottom:1.75rem; }
.comment-item {
  background:rgba(255,255,255,.04); border-left:2px solid rgba(192,40,30,.4);
  padding:.75rem 1rem; border-radius:0 4px 4px 0;
}
.comment-author { font-family:'Bebas Neue',sans-serif; font-size:13px; letter-spacing:3px; color:var(--red-bright); margin-bottom:4px; }
.comment-text { font-family:'Caveat',cursive; font-size:18px; color:rgba(240,236,228,.75); line-height:1.5; }
.comment-time { font-size:11px; letter-spacing:2px; color:rgba(240,236,228,.2); margin-top:5px; font-weight:300; }
.no-comments { font-family:'Caveat',cursive; font-size:18px; color:rgba(240,236,228,.22); text-align:center; padding:1.5rem 0; letter-spacing:1px; }
.comment-form { display:flex; flex-direction:column; gap:.75rem; }
.form-row { display:flex; gap:.75rem; }
.comment-form input {
  font-family:'Oswald',sans-serif; font-size:13px; letter-spacing:1px;
  background:rgba(255,255,255,.05); border:1px solid rgba(192,40,30,.2);
  border-radius:3px; color:var(--white); padding:10px 14px; flex:1; transition:border-color .2s;
}
.comment-form input:focus { outline:none; border-color:rgba(192,40,30,.55); }
.comment-form input::placeholder { color:rgba(240,236,228,.22); }
.comment-form textarea {
  font-family:'Caveat',cursive; font-size:17px;
  background:rgba(255,255,255,.05); border:1px solid rgba(192,40,30,.2);
  border-radius:3px; color:var(--white); padding:10px 14px;
  resize:vertical; min-height:80px; line-height:1.5; transition:border-color .2s;
}
.comment-form textarea:focus { outline:none; border-color:rgba(192,40,30,.55); }
.comment-form textarea::placeholder { color:rgba(240,236,228,.22); }
.btn-comment {
  font-family:'Bebas Neue',sans-serif; font-size:14px; letter-spacing:4px;
  color:var(--black); background:var(--red-bright); border:none;
  padding:12px 28px; cursor:pointer; align-self:flex-end;
  clip-path:polygon(3px 0%,100% 0%,calc(100% - 3px) 100%,0% 100%);
  transition:background .15s,transform .1s;
}
.btn-comment:hover { background:#ff3d31; transform:scale(1.02); }

/* FOOTER */
footer {
  background:var(--gray); padding:3rem 2rem; text-align:center;
  border-top:1px solid rgba(192,40,30,.18);
}
.foot-logo { font-family:'Permanent Marker',cursive; font-size:26px; color:var(--red); opacity:.38; margin-bottom:.5rem; }
.foot-sub { font-size:11px; letter-spacing:3px; color:rgba(240,236,228,.16); font-weight:300; }
.foot-back {
  display:inline-block; margin-top:1.5rem;
  font-family:'Bebas Neue',sans-serif; font-size:12px; letter-spacing:4px;
  color:rgba(240,236,228,.26); text-decoration:none; transition:color .2s;
}
.foot-back:hover { color:var(--red-bright); }

@media(max-width:600px){
  .grid{columns:2 130px;column-gap:1rem;}
  .polaroid{margin-bottom:1.25rem;}
  .album-tab{padding:.75rem 1rem;font-size:11px;}
  .form-row{flex-direction:column;}
}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">La Chabalada</a>
  <a href="index.html" class="nav-back">&#8592;&nbsp; Volver</a>
</nav>

<header class="page-header">
  <div class="header-stripe"></div>
  <div class="drips">
    <div class="drip"></div><div class="drip"></div><div class="drip"></div>
    <div class="drip"></div><div class="drip"></div><div class="drip"></div>
  </div>
  <div class="header-eyebrow">&#9632;&nbsp; Generación 2006 &nbsp;&#9632;</div>
  <div class="header-logo-la">La</div>
  <div class="header-logo">Chabalada</div>
  <div class="header-sub">Anuario &nbsp;·&nbsp; 20 años después</div>
</header>

<div class="gallery-wrap">

  <!-- ALBUM TABS — populated by JS -->
  <p class="scroll-hint">&#9664; desliza para ver todos los álbumes &#9654;</p>
  <div class="album-nav-wrap" id="album-nav-wrap">
    <div class="album-nav" id="album-nav"></div>
  </div>

  <div class="gallery-meta">
    <div class="meta-count" id="meta-count">Cargando...</div>
    <div style="display:flex;align-items:center;gap:.75rem;flex-wrap:wrap">
      <a href="/cdn-cgi/l/email-protection#157b7a6778746766557278747c793b767a782a6660777f70766128537a617a663027255974302725567d74777479747174" class="btn-upload">&#128247;&nbsp; Enviar mis fotos</a>
    </div>
    <div class="sort-btns">
      <button class="sort-btn active" onclick="sortBy('original',this)">Original</button>
      <button class="sort-btn" onclick="sortBy('name',this)">A — Z</button>
      <button class="sort-btn" onclick="sortBy('random',this)">Aleatorio</button>
    </div>
  </div>

  <div id="state-area"></div>
  <div class="grid" id="grid"></div>
</div>

<footer>
  <div class="foot-logo">La Chabalada</div>
  <div class="foot-sub">Generación 2006 &nbsp;·&nbsp; Navojoa, Sonora &nbsp;·&nbsp; lachabalada.com</div>
  <a href="index.html" class="foot-back">&#8592;&nbsp; Volver al inicio</a>
</footer>

<!-- LIGHTBOX + COMMENTS -->
<div class="lb-bg" id="lb">
  <div class="lb-inner">
    <div class="lb-top">
      <button class="lb-close" onclick="closeLb()">&#215;</button>
    </div>
    <div class="lb-frame">
      <div id="lb-media"></div>
      <div class="lb-cap" id="lb-cap"></div>
    </div>
    <div class="lb-nav">
      <button onclick="lbStep(-1)">&#8592; anterior</button>
      <span class="lb-counter" id="lb-counter"></span>
      <button onclick="lbStep(1)">siguiente &#8594;</button>
    </div>
    <div class="lb-album-tag" id="lb-album-tag"></div>

    <div class="comments-panel">
      <div class="comments-heading">&#9632;&nbsp; Comentarios &nbsp;&#9632;</div>
      <div class="comments-list" id="comments-list"></div>
      <div class="comment-form">
        <div class="form-row">
          <input type="text" id="c-name" placeholder="Tu nombre" maxlength="40">
        </div>
        <textarea id="c-text" placeholder="¿Qué recuerdas de esta foto?" rows="3" maxlength="400"></textarea>
        <button class="btn-comment" onclick="submitComment()">Comentar</button>
      </div>
    </div>
  </div>
</div>

<script>
/* ── CONFIG ── */
const GITHUB_USER   = 'normarsv';
const GITHUB_REPO   = 'lachabalada';
const GITHUB_BRANCH = 'main';
const PHOTOS_FOLDER = 'fotos';
const RAW_BASE  = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/${GITHUB_BRANCH}/${PHOTOS_FOLDER}/`;
const API_BASE  = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${PHOTOS_FOLDER}`;
const IMAGE_EXT = /\.(jpe?g|png|gif|webp|bmp|tiff?)$/i;
const GH_HEADERS = { 'Accept':'application/vnd.github.v3+json' };

/* ── SAMPLE PHOTOS (shown while loading or as fallback) ── */
const SAMPLES = [
  {
    name:'muestra_las_bocas.jpg', album:'Las Bocas', isSVG:true, label:'Las Bocas',
    svg:`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
      <rect width="400" height="300" fill="#1a2a3a"/>
      <rect x="0" y="180" width="400" height="120" fill="#0d1e2d"/>
      <ellipse cx="200" cy="180" rx="220" ry="40" fill="#1a3a5a" opacity=".6"/>
      <circle cx="320" cy="60" r="35" fill="#e8c84a" opacity=".85"/>
      <rect x="0" y="195" width="400" height="10" fill="#2a4a6a" opacity=".5"/>
      <text x="200" y="255" font-family="Georgia,serif" font-size="14" fill="#8ab4c8" text-anchor="middle" opacity=".6" font-style="italic">Las Bocas</text>
      <text x="200" y="278" font-family="Georgia,serif" font-size="10" fill="#4a7a9a" text-anchor="middle" opacity=".45">foto de muestra</text>
    </svg>`
  },
  {
    name:'muestra_escuela.jpg', album:'Dias de Escuela', isSVG:true, label:'Días de Escuela',
    svg:`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
      <rect width="400" height="300" fill="#2a1f0e"/>
      <rect x="60" y="60" width="280" height="180" fill="#3a2a14" rx="4"/>
      <rect x="80" y="80" width="100" height="80" fill="#2a1a08" rx="2"/>
      <rect x="200" y="80" width="120" height="80" fill="#2a1a08" rx="2"/>
      <rect x="160" y="180" width="80" height="60" fill="#1e1408"/>
      <rect x="170" y="120" width="60" height="4" fill="#8b6914" opacity=".5"/>
      <text x="200" y="255" font-family="Georgia,serif" font-size="14" fill="#a07840" text-anchor="middle" opacity=".6" font-style="italic">Días de Escuela</text>
      <text x="200" y="278" font-family="Georgia,serif" font-size="10" fill="#6b5030" text-anchor="middle" opacity=".45">foto de muestra</text>
    </svg>`
  }
];

/* ── STATE ── */
/*
  albums = { 'Todos': [...allFiles], 'Las Bocas': [...], 'Dias de Escuela': [...] }
  activeAlbum = 'Todos'
  displayed = current sorted list
*/
let albums      = {};
let activeAlbum = 'Todos';
let displayed   = [];
let lbIdx       = 0;
let sortMethod  = 'original';

function friendly(name) {
  return name.replace(/\.[^.]+$/,'').replace(/[_\-]+/g,' ').trim();
}

/* ── GITHUB API ── */
async function fetchContents(path) {
  const res = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${path}?ref=${GITHUB_BRANCH}`, { headers: GH_HEADERS });
  if (!res.ok) throw new Error('GitHub API ' + res.status);
  return res.json();
}

async function loadAlbums() {
  showSpinner('Revelando los álbumes...');
  try {
    /* 1. List fotos/ root */
    const root = await fetchContents(PHOTOS_FOLDER);
    const subfolders = root.filter(e => e.type === 'dir');
    const rootImages = root.filter(e => e.type === 'file' && IMAGE_EXT.test(e.name))
                           .map(f => ({ name:f.name, album:'Todos', src: RAW_BASE + encodeURIComponent(f.name) }));

    /* 2. Fetch each subfolder in parallel */
    const folderResults = await Promise.all(
      subfolders.map(async dir => {
        const contents = await fetchContents(dir.path);
        return contents
          .filter(f => f.type === 'file' && IMAGE_EXT.test(f.name))
          .map(f => ({
            name:  f.name,
            album: dir.name,
            src:   `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/${GITHUB_BRANCH}/${dir.path}/${encodeURIComponent(f.name)}`
          }));
      })
    );

    /* 3. Build albums map */
    const allFiles = [...rootImages, ...folderResults.flat()];

    if (allFiles.length === 0) {
      /* fallback to samples */
      buildAlbumsFromFiles(SAMPLES);
    } else {
      buildAlbumsFromFiles(allFiles);
    }

  } catch(err) {
    /* fallback to samples */
    buildAlbumsFromFiles(SAMPLES);
    document.getElementById('state-area').innerHTML = `
      <div class="state-box"><div class="error-box">
        <strong>Modo demo</strong>
        No se pudieron cargar las fotos reales (${err.message}).<br>
        Verifica que el repo sea público y la carpeta <code style="color:var(--red-bright)">/fotos/</code> exista.
      </div></div>`;
  }
}

function buildAlbumsFromFiles(files) {
  albums = { 'Todos': files };
  files.forEach(f => {
    if (f.album && f.album !== 'Todos') {
      if (!albums[f.album]) albums[f.album] = [];
      albums[f.album].push(f);
    }
  });
  renderTabs();
  switchAlbum('Todos');
}

/* ── TABS ── */
function updateFadeHints() {
  const nav  = document.getElementById('album-nav');
  const wrap = document.getElementById('album-nav-wrap');
  if (!nav || !wrap) return;
  const atLeft  = nav.scrollLeft <= 4;
  const atRight = nav.scrollLeft >= nav.scrollWidth - nav.clientWidth - 4;
  wrap.classList.toggle('no-overflow-left',  atLeft);
  wrap.classList.toggle('no-overflow-right', atRight || nav.scrollWidth <= nav.clientWidth);
}

function renderTabs() {
  const nav = document.getElementById('album-nav');
  nav.innerHTML = '';
  Object.keys(albums).forEach(name => {
    const btn = document.createElement('button');
    btn.className = 'album-tab' + (name === activeAlbum ? ' active' : '');
    btn.innerHTML = `${name} <span class="tab-count">${albums[name].length}</span>`;
    btn.addEventListener('click', () => switchAlbum(name));
    nav.appendChild(btn);
  });
  nav.addEventListener('scroll', updateFadeHints, { passive: true });
  setTimeout(updateFadeHints, 100);
}

function switchAlbum(name) {
  activeAlbum = name;
  document.querySelectorAll('.album-tab').forEach(t => {
    const isActive = t.textContent.trim().startsWith(name);
    t.classList.toggle('active', isActive);
    if (isActive) t.scrollIntoView({ behavior:'smooth', block:'nearest', inline:'center' });
  });
  /* reset sort */
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('.sort-btn').classList.add('active');
  sortMethod = 'original';
  displayed  = [...albums[name]];
  renderGrid(displayed);
}

/* ── SORT ── */
function sortBy(method, btn) {
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  sortMethod = method;
  let sorted = [...albums[activeAlbum]];
  if (method === 'name')   sorted.sort((a,b) => a.name.localeCompare(b.name));
  if (method === 'random') sorted.sort(() => Math.random() - .5);
  displayed = sorted;
  renderGrid(displayed);
}

/* ── GRID ── */
function renderGrid(list) {
  document.getElementById('state-area').innerHTML = '';
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  document.getElementById('meta-count').innerHTML =
    `<span>${list.length}</span> foto${list.length!==1?'s':''}`;

  list.forEach((f, i) => {
    const cap   = f.label || friendly(f.name);
    const count = commentCount(f.name);
    const card  = document.createElement('div');
    card.className = 'polaroid' + (f.isSVG ? ' sample-card' : '');
    card.style.animationDelay = Math.min(i * 0.05, 2) + 's';
    const seenKey = 'lachab_seen_' + f.name.replace(/\W/g,'_');
    const firstSeen = localStorage.getItem(seenKey);
    if (!firstSeen) localStorage.setItem(seenKey, Date.now());
    const isNew = !firstSeen; /* NEW on first load, gone after 48h via next check */
    card.innerHTML = `
      <div class="tape"></div>
      ${isNew ? `<div class="new-badge">NEW</div>` : ''}
      <div class="photo-wrap">
        ${f.isSVG
          ? f.svg
          : `<img src="${f.src}" alt="${cap}" loading="lazy"
               onerror="this.parentElement.innerHTML='<div class=\\'photo-err\\'>${cap}</div>'">`
        }
      </div>
      <div class="caption">${cap}</div>
      ${count > 0 ? `<div class="comment-badge">${count}</div>` : ''}
    `;
    card.addEventListener('click', () => openLb(i));
    grid.appendChild(card);
  });
}

/* ── SPINNER ── */
function showSpinner(msg) {
  document.getElementById('state-area').innerHTML = `
    <div class="state-box">
      <div class="spinner"></div>
      <div class="state-text">${msg}</div>
    </div>`;
  document.getElementById('grid').innerHTML = '';
  document.getElementById('meta-count').textContent = '...';
}

/* ── COMMENTS ── */
function commentsKey(n) { return 'lachab_' + n.replace(/\W+/g,'_'); }
function getComments(n) {
  try { return JSON.parse(localStorage.getItem(commentsKey(n)) || '[]'); } catch { return []; }
}
function saveComment(n, author, text) {
  const l = getComments(n);
  l.push({ author, text, ts: Date.now() });
  localStorage.setItem(commentsKey(n), JSON.stringify(l));
}
function commentCount(n) { return getComments(n).length; }
function formatTs(ts) {
  const d = new Date(ts);
  return d.toLocaleDateString('es-MX',{day:'numeric',month:'short',year:'numeric'})
    + ' · ' + d.toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'});
}
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function renderComments(photoName) {
  const list = getComments(photoName);
  const el   = document.getElementById('comments-list');
  if (!list.length) {
    el.innerHTML = `<div class="no-comments">Sé el primero en comentar esta foto</div>`;
    return;
  }
  el.innerHTML = list.map(c => `
    <div class="comment-item">
      <div class="comment-author">${escHtml(c.author)}</div>
      <div class="comment-text">${escHtml(c.text)}</div>
      <div class="comment-time">${formatTs(c.ts)}</div>
    </div>`).join('');
}
function submitComment() {
  const name = document.getElementById('c-name').value.trim();
  const text = document.getElementById('c-text').value.trim();
  document.getElementById('c-name').style.borderColor = name ? '' : 'rgba(232,53,42,.7)';
  document.getElementById('c-text').style.borderColor = text ? '' : 'rgba(232,53,42,.7)';
  if (!name || !text) return;
  document.getElementById('c-name').style.borderColor = '';
  document.getElementById('c-text').style.borderColor = '';
  saveComment(displayed[lbIdx].name, name, text);
  document.getElementById('c-text').value = '';
  renderComments(displayed[lbIdx].name);
  renderGrid(displayed);
}

/* ── LIGHTBOX ── */
function openLb(idx) {
  lbIdx = idx; updateLb();
  document.getElementById('lb').classList.add('open');
  document.body.style.overflow = 'hidden';
  document.getElementById('lb').scrollTop = 0;
}
function closeLb() {
  document.getElementById('lb').classList.remove('open');
  document.body.style.overflow = '';
}
function lbStep(d) {
  lbIdx = (lbIdx + d + displayed.length) % displayed.length;
  updateLb();
  document.getElementById('lb').scrollTop = 0;
}
function updateLb() {
  const f   = displayed[lbIdx];
  const cap = f.label || friendly(f.name);
  const media = document.getElementById('lb-media');
  if (f.isSVG) {
    media.innerHTML = f.svg;
  } else {
    media.innerHTML = `<img src="${f.src}" alt="${cap}" style="display:block;width:100%;max-height:58vh;object-fit:contain;filter:sepia(10%) contrast(.97);">`;
  }
  document.getElementById('lb-cap').textContent     = cap;
  document.getElementById('lb-counter').textContent = (lbIdx+1) + ' / ' + displayed.length;
  document.getElementById('lb-album-tag').textContent = f.album ? '&#9632; ' + f.album : '';
  document.getElementById('c-name').value           = '';
  document.getElementById('c-text').value           = '';
  renderComments(f.name);
}

document.getElementById('lb').addEventListener('click', e => {
  if (e.target === document.getElementById('lb')) closeLb();
});
